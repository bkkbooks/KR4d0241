body:
  text: 定庵類稿巻二宋衛博撰表辭免右僕射表宰枋中居豈容虚受奏函上列未聴牢辭不勝淵谷之虞洊凟乾坤之造中謝伏聞總制萬務正長百僚下以遂物宜上以穆天縡位髙責重於古難才人㣲望輕顧臣敢議以功則屬大事而當一靣臣無尺寸之可書以徳則鎮浮動而風四方臣唯譾薄之是媿徒抱朴忠之守誤膺神聖之知曾歳月之幾何荷寵光之及此渙發大廷之號躐居衆俊之先得位與時常情相慶循名責實有識為憂儻貽撓棟之羞何補奪乘之咎伏望皇帝陛下仰圖帝載俯諒臣愚名器不假人况於置相之重安危在出令必惟同徳之求追寢誤㤙式昭盛舉臣之願也天實臨之第二表股肱之寄義必推賢肝膽之誠力期悟主洊諭丁寧之指尚憑冒昧之愚中謝臣聞萬務之繁可以綱舉而難於周知四海之大可以心服而難於力勝惟古哲王之圖任必視衆論之所歸徳裕進而兩河革心楊綰用而宗臣徹樂俾天下聳聞而風靡則主道不為而日尊夫豈得於聲音笑貌之然將有見夫禮樂刑政之外伏念臣寒鄉晚出一世孤蹤繇言語侍從之臣參柱石弼諧之任術業則無以出廷臣之右資望則不聞居官簿之先方人乏之是承猶寛衆指儻國鈞之全畀必致疾顛上將遺盛世之羞下以觖四方之望願仍舊服别俟疇庸夫恩之深者難於言而臣未報不貲之恩請之煩者凟於聽而臣屢抗不移之請進退罪也夙宵懼焉伏望皇帝陛下察其非徇於常辭憫其甚憂於速戾旁求中外寜乏老成鼓舞風雷亦何嫌於反汗財成天地庶有補於同流一新岳牧之咨益重師瞻之地謝除右僕射表預政罔功久妨於賢路置相不善誰秉於國成籲天弗從跼地無所中謝伏念臣愚無一得過不自量有君無臣起遺歎於千古得時行道顧何愛於此身誓將醻甚盛之知固甞論天下之事有赫上聖照臨百官長轡逺御則豈無應變之才視古太息則宜得非常之輔惟兼聽可以屈至多之䇿惟大公可以服萬有之心方列位之充廷豈盛時之乏使况君臣之間莫先遇合故功業之建在昔為難以丙魏之興而孝宣雜用於刑名以房杜之盛而貞觀有慚於禮樂如臣何有敢進於斯兹葢皇帝陛下功光祖宗明並日月勵精而治方將建大政以興太平難得者時何以稱隆㫖而塞厚望臣之欲報誓以殺身然綆短者難於汲深而器小者不勝受大以天下自任寜不為前哲之羞非王道不陳惟竊慕事君之敬謝除尚書右僕射表參預朞年盍使治臣之不效咨疇百揆恐非同徳之是求抗辭牘以莫回愧此心之未亮中謝伏念臣賦材不腆承學非優居言語侍從之官庶猶寡過司禮樂刑政之柄將自速辜况春秋之義尊上公而人主之職論一相豈以堂堂之大國屬之㫁㫁之小臣外將貽輕漢之羞内無補尊堯之治雷不一風不再固知反汗之難尺有短寸有長殆匪量才之謂勉即師瞻之所終虞鼎餗之非兹葢伏遇太上皇帝陛下起萬物之初游六氣之辨撥亂世反之正有開貽燕之謀持衆美效之君猥荷仰成之眷而臣依日月照臨之下䝉雨露拱把之中天地恩深絲毫報蔑恥君不及堯舜永懐勵翼之圖當饋歎無蕭曹儻副焦勞之念平江府謝到任表荐將使指方叨内地之榮就畀守符俄竊輔藩之重僥逾特甚震懼靡遑中謝伏念臣家世寖衰人材猥下適際休眀之運屢更煩劇之除曽無片善之可名豈復優遷之敢筮况茲㑹府宻在邦畿轂擊肩摩衣冠指為走集之路甍連棟接風物夥於昇平之時自非得資望素髙之人難以成禁令必行之治如臣么麽曷與選掄茲盖伏遇皇帝陛下日月照臨乾坤覆幬欲廣至和之化兼收共理之臣顧若其愚亦膺重寄臣敢不深求民瘼䖍奉詔條任大力微當日思於官謗訟平政理誓仰副於君仁謝除觀察使表奏對便朝初無一得觀風大國驟出中除孰云介胄之下臣敢冒冕旒之殊眷控辭弗𫉬感涕徒零中謝伏念臣夲不知兵竊嘗憂世為民司命而不推進退存亡之計為國將兵而不明彼已勝負之機每聞恃敵之不來未有制人於先發謂餉道為難繼則因糧於敵者何義謂軍籍為尚寡則以少擊衆者何人縱酒髙㑹而士甘半菽之憂黷貨多藏而下無乞襦之惠負負爪牙之託惓惓畎畝之忠不圖晚節之遭逢獲展平生之約結固未能聚米以圖破隴之狀儻庶㡬借箸以眀撓楚之非名一藝者無不庸上之賜也以小言而受大禄人謂斯何兹葢伏遇皇帝陛下勇智自天聰明協帝披輿圖而有四方之志捐城邑以慰多士之心猥如負乗之微假以亷車之峻臣謹當有死無貳唯敵自求以口舌而得官則有辭矣執干戈而衛上敢不圖之又幕府上功未論實效詔書班賞頓越彛章退欲避以無從凜莫知其所措中謝伏念臣勇慙超乗技乏穿楊趙括之讀父書豈明方略狐突之教子弟粗守愚忠願輸横草之勞未獲死綏之所屬邊陲之唘釁䇿戈甲以長驅飲馬大江傳烽三輔惟疆場之不戒人謂斯何矧殘敵之就屠天相我也稽之漢法簿問則宜大哉堯仁䇿勲何有不腆二三之俘馘葢圖偏伍之賢勞豈繄微臣獨沾殊渥盡略横階之秩峻超三品之華天大人微恩深報蔑兹葢伏遇皇帝陛下推仁以保四海信賞以勵百工親屈帝尊臨見執戈之士猥如臣賤鼎來出綍之榮顧凡冒險以直前孰匪聞風而知勸臣敢不益鞭駑蹇勉副龍光以克敵示子孫世保康侯之錫不以敵遺君父誓空老上之庭辭免參知政事表帷幄近嚴豈容序進封章剴切未聼牢辭仰天日之向髙凛淵氷而莫喻中謝臣聞因任以成功者聖人之能事陳力而知止者臣子之令圖儻惟囊括以兼容何但棟隆之必撓臣之已試衆焉可誣學本師心而有古人之愚道以事君而有違俗之累固嘗論天下之事將以報人主之知而步蹇者不可絶馳器狹者竟難大受所幾萬分之一了無尺寸之長縱未能自弛以謝曠官敢復奸不韙而羞盛世人知居寵臣懼速辜伏望皇帝陛下矜不移之愚遷已行之令上以弭名器假人之誚下以紓負乗致宼之憂庶穆師虞少安㣲分謝除參知政事表奉為真之詔進秉政機抗引避之章莫囘渙汗拜嘉如隕委重奚勝中謝伏念臣奮湖海之陬乏廊廟之具生死文字僅類蠧書作為詞章不過蟲篆烏睹國家之大體偶陪英俊之諸儒冒昧進遷雍容獻納北門西掖敢論潤色於皇猷右府中臺莫負安危之注意未報不貲之徳長懐自弛之圖側聞有命之自天恍若履氷而待日飲河之腹久已易盈伏櫪之姿詎堪逺到兹葢伏遇太上皇帝陛下功髙與子道妙凝神植桐梓於拱把之中作成有造居柱石於弼諧之上佑啓無窮天地均恩頂踵思報惟股肱之戴后敢忘一體之同盡心力以事君庶答兩宫之遇謝除醴泉觀使表天營承乏績效蔑聞祠館祈閒綸言賜可保孤蹤於始末戴上聖之恩私中謝伏念臣屬荷主知起繇家食秉旄仗鉞六飛將戒於徂征被甲據鞍一介敢辭於耄耋烽烟間息羽衛留行獲逃避事之嫌敢上解兵之請以侯就第雖自適於退藏飽食無功益懐慙於尸素兹葢皇帝陛下定謀制敵觀變御時披天下之輿圖固不忘於武事以關中為根本宜坐治於明堂遂令負靮之臣歸享杜門之樂臣敢不心懐止足身戒滿盈視晚景於桑榆已無多日奉祠庭之香火永祝明時辭免御營使表羽衛時巡必嚴先置囊封夙奏恐玷殊私未推從欲之仁洊貢投誠之請中謝伏念臣受恩深厚竊位通華當疆埸之多虞豈頭顱之敢愛唯見阽危之迹久懐斂退之心蓋積毁所加既乏江東之望而寡謀有素寧知堂上之竒鉛刀已試於無庸鼠璞何堪於再獻方聖上焦勞於宵旰宜衆賢馳騖於事功退竊自量實虞非據伏望皇帝陛下諒籲天之懇興察父之慈畧反汗之小嫌收出綸之成命俾歸散地獲保餘年辭免御營使奏状附竊以戎輅親征将圖大舉天營置使必屬重臣敢謂么微廼叨器使中謝伏念臣頃縁衰晚得請退閒方睿照之當天攬羣才而在御孤蹤蕞爾過聽伊何收汗馬之勞則臣力既愆出籌幄之竒則臣愚素甚自量既審冒處為難豈惟将致於疾顛抑亦恐來於衆誚伏望亟收成命改畀時才庶穆朝僉少安愚分謝除御營使表有司夙戒将巡細栁之軍行衛先驅誤典鳴鑾之仗懇辭弗獲傴受奚堪中謝伏念臣結髪戎行半生環列雖執戈衛社粗肩自奮之忠然積羽沉舟幾致疾顛之咎破膽猶驚於曲木殘骸何取於勞薪惟二聖之深知銜大恩而未報太上起臣於戎馬飲江之際僅無侵軼之虞陛下眷臣於龍飛御極之初復值乗邉之警将整徂征之旅俾司禦侮之權俯憐蒲栁之先衰敢覬桑榆之末效兹蓋皇帝陛下沉幾獨運善任無妨幸渭而責可汗力奮唐宗之武封殽而伯西土行收秦穆之功臣敢不益堅晚節無愧初心追督将而守江湖共壯淮壖之勢至金城而上方畧願為嵗月之圖謝除樞密兼參政表基宥密之命莫重本兵負端右之才乃堪聞政揆寸長而何有共二任以奚勝中謝伏念臣蚤以諸生出逢興運學不足以窺聖賢之能事識不足以明治亂之大端追琢其章晚悔雕蟲之習支離其徳分安社櫟之生猥縁黄甲之名浸補皂衣之缺承明三入有忝昔人出守一麾何功方面既不能梔貎蠟言以同流俗仍未聞草衣木食而賦歸耕甫即鋒追登冠槖從更冒非常之渥遂班在服之光曾日月之幾何荷寵靈之及此愧深顔厚恩大人微兹葢伏遇太上皇帝陛下體道太清凝神姑射以爾衆請命用肇造於我家為天下得人迺燕詒於翼子曲輪方桷咸自儲材厚地隆天莫非戴徳誓竭股肱之力共閎宗廟之休徇國之心捐軀以誓謝除參知政事表參萬事之㡬久辜試可骩大公之選竟使為真永惟共政之臣將重本朝之勢妨賢是懼報國何從中謝伏念臣守承學之傳乏佐王之畧恩隆過聽進許陳愚察其任直而不欺謂其有猷而必告精神之㑹千載難逢體貌之私一介安取冒昧螢光之近日激昻蟁力之負山意廣才疎固少成事憂深責重幾欲醉心幸免則多詔除惡在矧多士朋来而在服而一人髙拱以圖功駟馬輕車盍効夷塗之駕汗顔血指苐虞善斵之羞勉與將衡敢安奪乗兹葢皇帝陛下籲俊以尊上帝惇徳而難任人察其處帷幄之近嚴粗無大過使之輔朝廷之遺忘倘有寸長然執器寶者常恐勿勝而涉淵氷者罔知攸濟險夷一節誓當有死命而無二心夙夜同寅共期總衆職以稱上意庶行所學不負初心辭免樞密兼參政表風雲之號敢覬力囬肝膽之誠倘容理奪重愬妨賢之悃仰祈從欲之仁中謝臣聞國勢之重輕實係人才之用舍矧司兵本兼預政幾非有宏毅任重之臣敢在精神折衝之位猥如臣賤乃辱疇咨以道則臣學僻而師心以事則臣才疎而負俗雖曰激昂而有志固甞展布以事君尺短寸長僅足有司之事内親外撫將為盛世之羞人知帷幄之榮臣有淵氷之懼伏望皇帝陛下仰圖帝載俯念臣愚見善則遷亟反已行之令不能者止何妨更照之明别登三壽之朋下益羣黎之望謝除樞密兼參政表本兵之任難以次遷共政之臣豈惟官備仰體安危之注意可無文武之兼資孰謂公朝姑容倖位中謝伏念臣學迂而寡要言大而少成賢不聞於諸大夫國人仕所望於祕書郎縣令太上過録臣於官賤人㣲之日陛下優假臣以出長入治之權天地恩深絲毫報蔑㫁簮踦履未忍棄捐今袴昔襦或堪惠養粗行所學無負平生敢圖一節之趨亟位六官之長蹈髙門之第滋愧重来佩華衮之章誦言勿稱當上聖熈天之運而大廷籲俊之公猥容措康瓠於鼎鼐之陳必有駕鳲鳩於霄漢之誚奪乗何補撓棟為羞兹葢皇帝陛下當饋懐人勵精求治長轡逺御已紹開億萬年之休公聽並觀俾益贊二三臣之後臣之得位久已誓心道之將行盖思明目以報天子時哉易失可無藉手而見古人稱塞為期糜捐後已賀郊祀禮成表乾道乙酉元日國之大事不可得兼嵗之上辛於斯為盛當四海貢圖之日表一人受命之符事越前聞慶覃廣宇中賀恭惟皇帝陛下聰明時憲聖敬日躋備文武之功是堯而已盡君臣之道唯舜為然和敵國以靖邊塵戢干戈而肆時夏秉兹馨徳信厥精禋惟吉之從順考魯侯之三卜有國之舊率由至道之宏䂓采儒臣獻胙之儀備曠古事親之舉臣有拘封守莫與駿奔歌噫嘻之詩想見成周之禮樂下恩澤之詔願宣大漢之威靈辭免郊恩表慶條顯畀志願牢辭避牘報聞迹疑異衆中謝伏念臣擢從散輩服在邇僚識不足以佐神明之幾才不足以適方圓之用雖願效佐王之畧敢與知格帝之功屬修毖祀之恭曾乏秉文之助大裘衮冕咫尺於威顔玉瓉黄流陟降於左右猥無闕事安敢叨榮伏望皇帝陛下制爵以賢循名責實欽上帝溥臨之福特與民同裁歴年謬賞之文姑從近始兹為盛舉敢復常辭謝郊恩進封開國侯表奉瑄陽位斂時昭事之休舍爵路朝辱是等功之典迫承威命愧越初心中謝伏念臣本章句之儒乏公輔之器小言而受大禄殆將遺滿溢之羞聖人而責愚臣何以塞優游之望兹告成於熈事曾莫佐於清光壇壝犧牲各以物序降登上下豈曰賢勞第惟神聽之嘉娯方眩珍符之委况敢圖班邑遂籍通侯視諸封賞之科愧彼烈文之輔兹葢皇帝陛下統承千載道暢八紘備物以告神明昭格昊穹之眷錫壤而光祖考猥先政事之臣惟徳厚者報豐而位髙者委重敢失墜事君之節用答揚天子之光辭免江淮都督表假鉞視師固難因任背城決戰此復何時敢修退避之常辭尚拜丁寜之温詔中謝伏念臣志卑莊鷃技拙黔驢少不知圯上之書老且乏江東之望發蹤指示或因人而有成賜履專征則在臣而何敢矧當饋歎蕭曹之日必中禁得頗牧之賢以道徳安强之威成江淮表裏之固皇咨裴度宜率舊章今拜淮隂徒驚衆聽伏望皇帝陛下亟還渙號改畀儒英要聞晉盜之奔秦無俾匈奴之議漢謝除江淮都督表駟介乗兵未效獻俘之禮五侯九伯迺專賜履之征孰謂臣愚猥䝉制可退循牆而莫避致專乗以為憂中謝伏念臣號令乏前賢之風勇力廢横戈之習年之將耄語既諄諄心之不長髪猶種種久負賜骸之願晚䝉血指之羞以宜投閒散之身䕶非素拊循之士蜂屯蝟聚而尚納憑陵之侮雪虐風饕而未休匽薄之師惟帝王之兵所貴必全雖厮輿之卒靡容不備久留征討内切主臣援枹鼓則忘身死其所矣安社稷以為悦人謂斯何夙夜以思進退維谷兹葢皇帝陛下聖智同符於藝祖寛仁上恊於光堯始以太王之心姑狥敵人之欲繼下元封之詔將躬武節之威猥遺見大夫原闕二字之賢過取一个臣無他之技臣敢不力修戎律躬履顔行收尺寸之功敢事便文之舉固表裏之勢當懐經逺之圖謝除徽文閣直學壬知荆南表内閣寶儲上憲圖書之府赤墀文石追參供奉之班萃諸儒稽古之榮賁白首乗邉之役中謝伏念臣甫偕召節入侍禁塗曾詔墨之未乾已恩綸之狎至坐念江湖之逺迹周寰宇之間廣樂鈞天直疑清夢蓬萊藏室尚接英躔炯然欲報之心老矣既愆之力兹葢伏遇皇帝陛下鼎新庶政器使羣臣當饋以思遐想蕭曹之佐推轂而遣當求頗牧之材顧臣無纎芥之能何以禆寥廓之見奄長楊而連五柞空懐屬御之塵輕尺璧而重寸隂請示洛書之訓倘酬晚遇無愧夙心謝除刑部侍郎表乗軺所布方披三輔之圖持槖近班猥玷髙門之地報章有煥拜起知榮中謝伏念臣雅志倦㳺一官平進雖早縁推擇嘗參國論之餘而老益粗踈伏在吏塵之下牧人馭衆曽乏寸長奉使典州久逾二紀孰謂桑榆之晚親承旒冕之知以賤有司之臣假小司冦之職髙第而補漢廷之缺臣匪其人再見而位趙國之卿事光在昔兹盖伏遇皇帝陛下恢張治具衆建人才察臣官簿之歴年冝知報國謂臣吏道之専智可與平刑躐寘明廬徃圖末路臣敢不益鞭駑蹇仰副鴻私濫司空城旦之書當體好生之徳辱天子從官之選敢忘獻可之忠謝除吏部侍郎表趨一節之朝方起及郊之敬佐六官之長遽叨即命之榮内揆微蹤仰辜隆施中謝伏念臣滿襟塵土投老光隂伏櫪之嘶詎堪致逺飲河之腹久已属饜誓將造膝以陳愚冀即奉身而退處敢虞幸位有忝公朝以日月論思則臣學殖之就荒以銓綜人才則臣風裁乎何有勉即鵷鴻之綴終慙樗櫟之非兹盖伏遇皇帝陛下道暢八紘統承千載舞雲門而奏大夏兼存蕢葦之音執玉帛以見羣神不鄙陶匏之用施諸俊籲亦罔遐遺臣之㑹逢何以稱塞斯猷惟后之徳永肩一心視死猶生之年有如皦日辭加鎮表出二節以授師兹為曠典呌九閽而請命尚閟俞音中謝伏念臣伏在里居猥當人乏自省據鞍之已老迫承假鉞之専征設九拒其有餘敢議昔人之能事欲壹鬪其可得實遵弭敵之宏圖惟上方興受命之符乃元日獲始郊之卜徳馨上達兵祲旁銷曽何閥閲之可躋辱是土田之多與稽諸近比得者幾人以王命討不庭臣之職也貪天功以為已人謂斯何伏望皇帝陛下察其引分之由中録其臨寵而思戒風雷鼓舞雖作號之已孚日月照臨尚容光之必届第二表益地之恩正虞虚授循墻之請所幾必辭自憐悃欵之愚未諭丁寧之㫖中謝臣聞祭澤之大以侈神靈之休賞國之經必示勲勞之勸而臣内缺奉璋之敬外無横草之功猥縁惠駿之公敢冒列臣之寵臣聞命矣國謂君何伏望皇帝陛下聖度隆寛皇明委照亮其止足而知懼知其展布以事君辭邑而請繁纓非有效尤之志吐哺而趣銷印益彰從善之仁謝加鎮表節旄旗纛晉長二師山川土田益陪多賦揚大廷而作號視盟府以知慚中謝伏念臣被遇聖朝逢時肇祀属有護羌之役阻陪上雍之班惟國之大事在戎要洗欃槍之厲氣而天之所助者順果符帷幄之成謀蕭然班馬之聲允矣止戈之武盖聖人為能饗帝故羣臣莫望清光蔽自上心迄成熙事曲推厚下之澤過録守封之臣兹盖皇帝陛下清明在躬寅畏享福一嚬一笑不以假人大邑大官宜章有徳而臣早嘗險阻晚脱阽危功不腆而禄既豐心弗强而身餘㡬間兩社以輔公室猥為大國之羞封萬户而為帝師益引下臣之分天申節賀表歌薰廣殿初占夢日之祥擊壤黎民率罄後天之祝驩傳萬宇運際千齡中賀恭惟太上皇帝陛下淵懿聰明剛健中正功成不有黄屋非帝堯之心道妙常存赤水契有熊之寶備九州四海之奉極五日一朝之娯慶集宗祊事光今古載屬誕彌之旦聿彰丕應之符臣矯首内庭庇身外鎮獻金鑑之録雖逺龍光望玉巵之觴惟勤虎拜接千嵗之統天命有開盛五日之朝帝觴惟謹慶覃家國驩動神人中賀恭惟太上皇帝陛下登濟大業而不有其功并包衆論而强名以道褰裳大寶執契元珠無為而尊者天既超象數有徳必得其壽何待禱祠笑傲羲黄粃糠堯舜臣屬將使傳阻造宫庭曾無漢家令之言益彰聖孝第有華封人之祝敢貢愚忠炎夏應期實啓離明之運後天稱壽光昭震夙之符慶溢緜區祥開是日中賀恭惟皇帝陛下丕膺厯數紹復基圖施仁猶列聖之心不忘兼愛稽古以百王之道坐格純熈三階平而風雨時五榖熟而人民育驩聲和氣自然雅頌之興備福儲祥不待禱祠而致受天之祜與世咸休臣將命淮壖馳心魏闕九賔在列莫陪漢殿之儀萬壽無疆徒罄華封之祝謝賜生日禮物表犬馬之生日還初度牽醪之賜式在太官孰虞一介之下臣敢辱大君之善養腹饜徳施頂戴榮光中謝伏念臣本章句之儒乏經綸之具眇矣缾盆之陋器參諸鼎鼐之後陳借箸以籌何補辰猷之告當饋而歎尚辜旰食之憂乃膺備物之將過録左弧之始兹葢皇帝陛下禮嚴體貌義篤股肱將共寄於安危爰下同於欣戚臣之拜賜敬以誓心猶已饑天下之民願景前修之志使人有君子之行庶揚既醉之休謝賜對衣金帶鞍馬表上褚兼衣侈以萬釘之寶内閑䇿駿沃如六轡之華心驚去國之陳人目眩充庭之大貺中謝伏念臣少馳藝苑長服官箴被蘇子之故貂窮通一致悟塞翁之歸馬得喪兩忘敢謂餘生更叨蕃錫兹葢皇帝陛下垂裳御宇折箠平戎錫命之章舉知安燠懐人之歎下軫虺隤有光帷幄之臣俾强筋骸之報惟一夫之短褐猶已寒之儻庶政之駭輿又誰咎矣又悸帶為容曩猶不稱據鞍示壯晚復何堪尚分廏庫之珍良用撫節旄之恩渥中謝伏念臣奮由徒步賤且執鞭纂楚制之短衣甘為下走賜齊官之三服望絶榮塗猥縁推擇之歴年屢忝便蕃之大貺赤芾之子在位何觀繁纓以朝致寇是懼兹葢皇帝陛下念功惟篤圖舊過優捐千里之封於兩驌驦而何愛公四海之望縱一敝袴而不私顧臣無汗馬之勞何以弭濡鵜之刺况臣以既愆之力荷均佚之恩鳩杖白衣散吏敢同於前輩安車駟馬傳家願洎於小臣謝賜生日生餼表劬勞興念載臨六射之辰錫予流恩遽拜九重之命赧然是懼厚矣不貲中謝伏念臣奮跡羇單逢時隆盛陛九級而逺地久肅䕶於巖除鼎三足以承君實濫陪於公秩自知過分已幸丐閒既開異姓之封復陟面槐之位所慚朽質莫報大恩敢云初度之期猶軫不遺之念珍兼飲餼欽承厚意之將膳沃羶麷益重匪頒之式兹盖皇帝陛下普臨庶類優寵舊臣顧此衰遲特示饔飱之腆眷言疇昔尚加體貎之隆臣敢不内揣僥踰仰懐徳恵賜尊推食豈惟醉飽之私銘骨鏤肌誓竭㳙埃之報奉使汴京賜燕等謝表開閶闔之道館置如歸踐籩豆之陳殽烝有衍首拜濡雲之渥頓空䝉露之塵中謝政夲施仁善優去殺惠顧展親之國寵綏將命之臣稱萬年之觴預想㑹朝之勝馳四乗之傳佇陪俠陛之趨賜酒果宜城之貢湛若淵渟上苑之珍粲為籩實中謝心味道腴之㫖手褰藝圃之華酌彼金罍有忝知勞之賜報之瓊玖徒深永好之思真定府賜燕馳四達之郊方首適燕之路陳三饋之簋又沾在鎬之恩中謝接下思恭為國以禮有赫衣裳之㑹不寜傳送之臣序其情而閔其勞君之賜也舍其大而拜其細主則擇之賜酒果醖酎躍波甘梨比蜜彼美魏都之富兼榮晉錫之蕃中謝圖功尊俎之從容受計豆籩之奔走蘭興桂發配明徳以惟馨春熟夏成歸大鈞之播物燕賔館賜燕一介行李甫休聚柝之郊三命循牆亟辱班荆之燕中謝脩已以安百姓養賢以及萬民大成為國之基不棄善鄰之寶公當享卿當燕敢墜彛章君以禮臣以忠願揚休命賜酒果望五陵之佳氣近接蓬莱命六轡之皇華載馳原隰㫖甘維旅孤陋難䝉中謝受四海之貢珍交萬物而有道使而未致既寛私飲之誅受之勿辭有負計功之賞又舍館既定益忘徒御之勞籩豆孔嘉申以樽罍之富匪頒沓至荷戴奚勝中謝荷天覆之仁篤臣隣之愛投醪均恵雖造次而不忘懐核為恭豈周旋之敢墜積有拜恩之寵若為論報之方朝見畢賜燕發幣公朝甫達頌椒之慶肆筵候館載均在藻之歡中謝設太極之仗以見羣臣采長樂之儀以朝正月恩隆嵗飫義篤方来繼好之謂禮經天所命也大饗以仁賔客臣敢奸之賜酒果珠庭日角退猶眩於天光玉勒金貂遽下馳於星使登受便蕃之錫仰慚恩異之隆中謝臨極辨之朝仰容光之照義由一貫譬樝棃橘柚之同歸賜出尚方固漿醴醬酏之異制拜嘉有耀懐感無窮賜分食廩繼粟而庖繼肉日飫大烹燕有好而鼎有陪禮加推食中謝傳餐决事當饋懐人雖八物之用珍非我志也惟一夫之失職猶已饑之絶甘當御之筵委况越疆之使屬饜厚徳震激微衷賜酒果麟鳳之泉飲䏻却老燕秦之植當比封君藐是逺臣萃兹隆施中謝沉酣六藝長育羣材崇館餐於緇衣好賢不倦選威儀於既醉備福方興弗遺一介之微重增兩君之好永言匪報有愧於中花燕賜酒果御栁宫花轉春風於廣内金盤玉筯溢喜氣於人間中謝徳配天倪功參時令羽觴傳滿恰叨飲御之榮賔豆載加退有分甘之惠荷君恩之重辱顧臣賤以奚勝射弓燕賜酒果貍首諸侯之節臣敢預聞魚麗萬物之多君䏻用禮中謝寢兵不試恭已無為清者聖濁者賢各遂熈䑓之樂大為果小為蓏無非貢篚之珍拜手以還銘心莫既賜生餼館給之須日勤候吏餼牽之賜式在太官珍送則優食浮是懼中謝禮隆鼎養治尚豐亨干戈載戢而民以寧祝史無求而福自應胙膰以親兄弟之國方懋爾猷飲食以盡忠嘉之心斯惟后徳燕賔館賜宴朝受命而夕飲氷猥無乏事入有勞而出贈賄寵備多儀折俎在庭征驂顧櫪中謝交鄰有道御衆以寛有嘉一介之勤屢飭九賓之副奏驪駒之闋即問所塗囘龍尾之班第增存闕賜酒果泰極函三已致元政之祚東皇太乙又違咫尺之顔使指趣臨賜儀俯逮中謝厚送將之禮篤終始之恩歸奉春祺願介兩君之眉夀旁流解澤庶偕百果之敷榮真定府賜燕歸騎載驅屢更信次使貂中飭逺示燕私中謝積善在躬成功裕後珠盤玉敦篤信誓於齊盟昌歜形鹽享多儀於備物若奉當陽之御不忘加敏之恭賜酒果王人俯暨帝賚曲加睠言改斾之遥用畀中塗之寵中謝道侔乾施智秉離明顧醴齊之飶馨既篤有邦之慶咏夭桃之蕡實寜忘爾室之私載惟遮道之榮盡釋馳車之歎汴京賜燕龍堆遐舉初無可使之才鸛垤朝鳴敢有懐歸之喜眷兹道阻式是篚將中謝恵加行李之徃来禮大東都之供帳呉頭楚尾肅歸馭以星馳趙北燕南望修門而雨絶尚綏永好溥燕函生賜酒果使旌萬里奉美報以遄歸君門九重瞻晬容而逾逺上恩滋至亟饋中来中謝慈發天衷愛均臣體曲軫驂騑之敝爰敷綸綍之華惡㫖酒而好善言特厚致勤之禮食果實者後君子敢隳維德之儀歸載有光感銘増固
