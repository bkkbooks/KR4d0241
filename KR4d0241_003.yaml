body:
  text: 定庵類稿卷三宋衛博撰啓賀左相冬啓觀復以見天地順乘消長之期論道而理隂陽雅有燮和之助驗一線於化國舒長之日考八能於治世安樂之音兹為大有尚賢之符宜獲既醉備福之應恭惟某官問學發天人之祕聲名垂宇宙之間躬周公之咸勤相成王為左右任伊尹之先覺處斯民於唐虞易舊俗為尊君親上之風俾在位有宿道嚮方之意禮樂法度煥然益彰嵗月日時兹焉無易授泰元之策方占廟社之休履千載之期永協君臣之遇何止過汾陽中書之考正應為空同問道之師某久荷陶成坐縻符守阻拜踐長之祝苐增懷德之私禱頌交深名言曷既賀右相冬啓備五物而書式謹占天之候合八能之技載嘉致治之休方居大有尚賢之時宜獲既醉備福之應恭惟某官學探天人之藴奧德為朝廷之重輕非堯舜不陳務引君於當道以稷契自許願使已為良臣開衆正之路以廣建人才講畫一之法以共安海宇禮樂修而庶事備風雨時而三階平璧月珠星已驗泰元之䇿葭灰嶰管順乘一氣之和履千載之昌期開八荒之夀域帶礪山河而未老勳名鼎鼐以無窮某仰託鈞陶坐縻符篆阻拜迎長之祝第增懷德之私賀致政丞相冬啓剝七日而復其見天地之心具萬善而齊以待隂陽之定繄大人不失進退之正宜神明申以福祿之休恭惟某官德冠生民勳在王室事君必以堯舜致治幾於成康以直道而行三公不易其介致為臣而去萬鍾於我何加傳車之盛髙掩於韋侯置几之尊尚觀於孔氏蓋仲舒去位而就質疑議若姬公告老而不違成周兹乘千載之期盍冠三師之首酌大斗以伸黃髮之養歸衮衣以慰西民之思某早託化鈞坐嬰郡紱阻拜迎長之祝第增懷德之誠賀參政冬啓合八能於前殿方占至治之和轉一氣於洪鈞宜備彚征之福恭惟某官望尊百辟勤施四方逢時遇合於千載之間聚精會神於一堂之上孟子之言必以仁義君陳之告莫匪謀猷論道而理隂陽方密參於大化觀復以見天地兹永踐於昌期泰階占三象之明五福備九疇之敘對時受祉與國咸休賀樞密冬啓兆一氣於黃宫為天地隂陽之始授泰元之神策驗日星珠璧之符繄二公寅亮之功備既醉太平之福恭惟某官丹青王度經緯人文以山甫之柔嘉式是百辟躬周公之棐迪勤施四方制禮樂以導中和輯干戈而陳懿德開夀域八荒之表致明主三代之隆備五物而書已享豐年之報合八能之士益知治世之休占泰階兩兩之符答維石巖巖之望民心所屬天貺攸歸賀安撫參政冬啓正朔立元漢厯紀三辰之首踐長迎福魏朝推千載之期仰勳名一代之宗宜夀祿如川之至恭惟某官勤施揚歷德冠魁倫陳謨合稷契臯陶之忠論道適堯舜文王之正吉甫才兼文武盍為憲於周邦子牟身在江湖雅存心於魏闕國用閔勞之典帝賡注想之篇方八能占宫奏之和而三台驗色齊之應先一州而後天下是豈吾君之心迪髙后以康兆民行膺作相之命對時受祉與國咸休某早託化鈞坐嬰郡紱阻拜一觴之夀第馳千里之誠賀殿帥相公冬啓觀來復於天地之意兹為浸長之辰成安強於道德之威宜備太平之福恭惟某官勳藏盟府澤被生民以吉甫之文武而憲萬邦若畢公之弼亮而勤小物斯謀斯猷而入告于后不矜不伐而莫與爭能精神相得而益彰君臣於斯而為盛合八能而備樂方占兵祲之祥轉一氣於洪鈞永翊化元之妙對時受祉與國咸休某久託殊私坐縻假守阻拜迎長之慶第增善頌之勤賀王紹興正旦啓攝提直斗正閶闔開黃道之辰旁磔在門仰燕寢凝清香之地順嵗時之更始慶德齒以俱新恭惟某官卓然公輔之資加以聖賢之學聽尚書之履早家魁象之邊懷會稽之章常近蓬萊之氣治行獨髙於天下姓名久在於屏間乘三朝上計之初膺四輔使能之寵賦椒花之頌莫陪舉夀之儀獻茅茹之占第有逢辰之慶賀張明州正旦啓春回北斗三元占首祚之休律應東風萬彚有向榮之意伏惟某官身兼數器學貫羣言望髙人物之宗名在圖書之府雜儒術以輔浩穰之政逺追京兆之家聲以義理而應中外之文要是甘泉之法從尚屈海邦之嘯諾少哦戟衛之風流嵗序更新天休益介賦椒花之頌莫陪舉夀之儀獻茅茹之占伹有逢辰之慶賀向揚州賜帶啓御帑分珍煥九環之盛飾詔恩臨錫聳七郡之榮觀增賁身章特超命數恭惟某官才推國器望重寶臣久騰襦袴之謡茂靄搢紳之譽果膺大賚庸示寵光逺符露冕之風流仍掩賜金之故事佇展立朝之盛即如委佩之榮某想望光儀阻修賀謁永言贊喜莫罄占詞賀司諌啓伏審敷求時望進直諫垣公道既行有識相慶咸謂聖神當更化之日所用臺諫皆親擢之才必能盡言以塞厚望然觀古人輔導之意不為近世沽激之忠率皆因事以獻言相與講善而救失譬之良藥之已病五榖之療飢務在可行不求過直蓋叔孫之爭誠切安太子者留侯之功王陵之義甚髙定劉氏者陳平之力故五諫以諷為上而大忠以德復君因偶語之問而定功行封觀破陳之舞而俯首不樂晏子以獻否而成其可石侯於進見如不能言皆忠臣不忘愛主之至心而後世當為事君之大法伏惟此意難與俗言某官志節剛毅而有亷靜不求之風詞華藴藉而有質直敢言之氣踐揚外服深究民情糾正省曹素通國體今天子務先誠朴以厲俗力行寬大以便民議獄緩刑制禮作樂宜益講明至當之論庶以上副勵精之懷以仁義責難於君以旦夕承弼厥辟使齊人之敬莫如孟子則鄭公之願克為良臣某久辱深知願觀能事友直友諒固嘗見期以古人大書特書尚俾續刋於諫苑賀魏參政啓恭審預聞大政晉長庶僚得君如彼其專實行宰相之事在廷無出其右可謂社稷之臣儻無為日月之功庶下符霖雨之望惟古有訓得時為難計明良之相逢諒今昔之有數故天將降大任以道先覺斯民同心合德於千載之間聚精會神於一堂之上令行禁止言聽計從俾當寧無為而日尊則舉國自從而風靡有來不世之略以起非常之原伏惟某官奧學見天地之心逹識明國家之體以稷契自任願使已為良臣非堯舜不陳務引君於當道禮樂先進文章巨公羽儀鵷鷺之行鼓舞雷風之號風流第一外竦殊鄰智略無雙見推兩禁卓然廊廟之具隱如巖石之瞻方聖明兼十日之光而魁輔首六符之象文武並用功業益新齊百工以從王無斁成周之康事總衆職以稱上有光相漢之家聲大道為公太平有象衮衣赤舄際遇叵量鐵劵丹書登載何極某窮既蹈飢寒之水火愚弗知仕進之門庭四五十而無聞惟終也已二三子乎何患其在兹乎飛鳴夏屋之成踊躍大鈞之播效一狐之腋慙非粹白之求濡千之毫願罄汗青之述賀葉參政啓伏審顯膺綸綍寵正鈞樞有政與聞實司文武之二枋得君如彼是謂聖賢之一時有識系心在廷增氣夷考贊元之地莫難全德之人吏姦而無懲艾者失之寬文深而多中傷者志於猛未有總衆職之名實而率由於故事佐萬幾之裁決而必先於有司進相得於精神退兩忘於適莫雅有經綸之具隱如巖石之瞻當世所期在公為稱恭惟某官禮樂先進文章巨公以剴切之言動悟萬乘以髙簡之度儀表百僚崔造守藩早兆登庸之應傅師典選衆推宰物之公惟大人格君之心而仁者服人以德楊綰始用而郭令徹樂晏子一言而齊國省刑廣厦細氊側聞於啓沃前旒黈纊不蔽於聰明不為日月可冀之功庶廣社稷無疆之福三后同底於道上方有意於太平四方惟乃之休公亦有辭於永世某渺然陋器瞪若絶塵斷簪詎忍於遐遺舐鼎能忘於仙去重念某祿養之計久厄瓜時耄老之親屢空菽水念祥金之躍冶知賀燕之依人祭竈而請比鄰儻收憐於故部扣閣而呼宜祿敢想望於諸曹以慶以祈且忭且蹈賀朱參政啓伏審晉膺書贊參秉政幾惟興王之賞諫臣監於成憲斯仁者之在高位相我受民廊廟尊榮搢紳稱頌恭惟某官神全而氣定心正而身修道本先知伊尹蓋天民之覺仁必有勇仲由為中國之強性成之行無待於韋弦慎獨之誠不愧於屋漏用舍一致勤勞百為片言輸悟主之忠再見位上卿之貴明目張膽於方寸之地收功立名於千載之期賈生所陳憂世之言子政不忘愛君之義非天下至誠孰能與此宜吾君舉國而以聽焉明良相逢朝廷既治上下知去利而懷仁義之用癃老可扶杖而見德化之成惟衆賢和則物和而百官正則民正三后同底於道上方髙拱於成功四方惟乃之休公亦有辭於永世嗣觀渙汗顯正魁台某早嵗門牆一官江海課空名之無用自嗟牛斗之不神數奏籍之同升殆類甲辰之雌伏歡喜大鈞之播矜憐踦履之遺將擁篲以無從第傾心而莫喻賀洪參政啓伏審顯膺書贊密與政幾有識具依不謀同慶恭惟歡慰某官器閎而用逺學成而行尊述作之工鬼神爭奧範圍之妙天地同流元凱之佐勛華已濟美一門之盛周召之為師保行同風三代之隆輿誦所期斯言可必某典司留管芘冒鴻鈞眷里社之有光望門墻而切忭謝執政啓守符江介屢移病免之書將漕關中誰料詔除之目久孤試可倍費陶成恩深天地之罏感溢神明之舍伏念某清時冗士白首陳人不腆性靈丘壑殆忘於故我平生簿領塵埃何苦於汚人流行世路之風波踐履物情之荆棘回觀六十夢境何殊默數大千轍迹幾遍固嘗借玉墀方寸之地一再望天威咫尺之顔親奉褒俞坐傾意氣如病顙之馬頓酬伏櫪之思顧折轅之車終乏夷塗之用北臨漢沔南歷江淮嵗月遒於往來齒髮熏於憂患鼷鼠五技正爾易窮遼鶴千年忽焉已至永愧西州之耆舊曽無善狀之毫分誓將歸卧於漳水之濵敢復存心於魏闕之下况今浙部眂昔王畿非至公不足以窮隱戶於南陽非有政不足以占流民於東海運米至數千萬石寧復遺謀解綬去四十餘人定應創見合此難能之舉屬之不肖之身所愳辱知敢云負念兹蓋伏遇某官丹青王度掌握道樞綱舉目張恢六籍所未談之治尊堯翼舜乘千載不可逢之期方將正鼎軸以冠百辟之尊何止賜金石而彰五利之報槖籥元功之妙甄鎔庶類之微偃直無遺施生有敘猥如一介與在兼收用則行而舍則藏早辱憐其可教賜之大而知之至今喜遇於所期載惟稱塞之方未有糜捐之會某敢不無渝素守益勵宏圖爵之公朝雖不期謝之私室遇以國士又豈應報以衆人謝執政啓謝除刑部侍郎披三輔之圖未周行於所部參兩禁之籍遽敢意於中除眷言臨老之遭逢遂過平生之期望恩均天地感激肺肝伏念某雅志倦遊一官平進雖蚤緣推擇嘗參國論之餘而老益粗踈伏在吏塵之下幾近長安之日輒回蓬海之風奉使典州殆經三紀求田問舍久結寸心所期嘯東臯而賦柴桑之耕何敢夢南柯而付邯鄲之枕顯有服章之寵煥然詞命之優繇部刺史之官竊小司冦之職庶言庶獄庶事上方圖宅俊之功惟內惟貨惟來官必得簡孚之政庶廣畫衣之化不惟城旦之書顧非其人弗稱是懼兹蓋伏遇某官表儀百辟勤勞四方以孔子之大成教人不倦若伊尹之先覺非豫而誰猥如不肖之身尤荷非常之眷左提右挈曲盡生成事舉言揚一無堪稱某謹當益堅素守更勵壯猷儻立朝不為名教之羞則異日無負知己之報與新縣丞啓伏審遵養令圖回翔贊府問塗有日闔境傾心恭惟某官簮槖名家凖繩大器過都越國未騰歷塊之蹤錯節盤根已試遊刃之利眷兹劇邑介處通都帑庾無經月之儲田萊承大浸之患簿書期會方急相仍鰥寡流亡欲救無所述六職以補其令孰非望賜之人對二松而哦其間肯有負余之歎願言覿面坐以馳神某伏在下風固非一日猥以馬牛之走獲並英遊頓空鴈鶩之書佇觀能事凡諸悃欵悉在瞻承通問周參政啓揆棲睫之微生蚤蒙化育望絶塵之軼步浸缺師承兹飭事於戍瓜方馳心於蔭樾尺書不腆大造焉依恭惟某官文章巨公禮樂先進擬聖而作塗改清廟生民之詩非道不陳羞稱管仲晏子之事以神明之幾周萬務以泰和之治革五兵申伯惠直而揉此邦吉甫將明而保天子蓋斯民之先覺者宜吾君之倚相焉浩然孟子之去歸久矣裴公之注想都俞吁咈當世所聞輕重安危惟公是繫傾聽風雷之號上寬霖雨之思某學殖就荒官針惟謹飲河之量顧滿足以無餘深林之巢正飛鳴而有託屬目階符之耀馳神蓬海之遙黃閣閎深青春駘蕩願副九宸之眷益遵六氣之和賀楊資政啓伏審告成大典錫慶羣工眷儒英首議之忠極祕殿升華之寵訓詞加異委寄增隆竊惟載籍之前聞莫盛熙朝之有作儲祥備福得三代受命之符論德紀功為萬世不刋之典啓兹盛舉自我元樞恭惟某官學冠魁倫望隆幃幄以仁義事君如孟子以謀猷告后如君陳當朝廷抗議於一時之間乃翰墨䇿勳於十年之後有開羣議異禆諶草創之謀始正一元得仲尼筆削之意光紀上天之眷命系隆九聖之基圖恩備册書勳藏廟社接千嵗之統已觀信典之成陳泰階之符益對昌期之遇某辱知最久聞命增欣莫陳賀厦之恭第切掃門之意回交代縣尉啓服膺賢範久願定交䇿足後塵偶緣躐次弗虞幸會乃過初心惠然信使之相先戒以官期之將及多文在手盛德照人英英摛翰之華凛凛告新之義伏惟某官秀發鄧林之産摶扶溟海之程能事可書治有奔秦之盜功名立致時交薦禰之章某甫脫詞場豈嫻吏道但喜伐柯之有則殊忘續尾之非才兹假屬於衛官少愆時於瓜成然詩人雖老敢貪率府之逍遙况吏隱可期漸近市門之仙去倚須訖事即命戒裝懷抱之私參承以既賀曹侍御啓伏審疏榮詔檢進位臺端風采素聞中外不繩而自肅紀綱既正人主無為而日尊成命一頒歡聲四達恭惟某官性資詳重心術融明學如孟子之敬王言皆仁義仕若君陳之告后德盡謀猷親逢極治之朝入居正色之地明耳目以佐天子披腹心而獻良圖聨內朝供奉之班眷知已久據橫榻劇雄之任寵命惟新更須專席之求徑被鴻樞之拜某竊觀除目喜倍羣情坐嬰符竹之拘莫展門墻之慶回程知府啓賔從經過既缺候人之敬關征何問益為地主之羞尚勤文告之多儀有愧隆謙之厚德伏惟某官氣稟岷峨之秀異文窺揚馬之風流仗節西還早厲棄繻之志前驅所過曽誇負弩之迎兹奉計於三年即通班於兩禁聲猷所暨逺邇知歸某政拙非才令行無素叩堂曉賊深慙廣漢之威沽酒賦詩尚謹玉川之謝永言愧佩莫既敷陳賀沈正言啓伏審簡自帝心進當言路正人登用有識嘆嗟咸謂左右諫爭之官惟是出入諷議之事考功課吏既無以程殿最之書辨是與非又不専當彈擊之任自非有夷達寡求之操而能秉質直不欺之誠則何以格非心於未萌之先復君德於無過之地恭惟比嵗親覽萬幾開衆正之塗興太平之治副上所欲非公其誰伏惟某官學由為已而推以及人道本正心而至於格物重厚足以鎮浮動亷靜足以律懦貪特立獨行蓋舉世莫為之勸沮安時處順顧外物何有於重輕退非務於養髙進不聞於有喜惟盛德源流之自見先正典刑之存臧孫不忘宜有後者魏謨能繼是以似之必將陳善閉邪而務盡責難之恭獻可替否而不為近名之直若膏澤之浸潤若聲味之相成非堯舜不陳務引君於當道以稷契自許願使已為良臣某久荷眷知倍傾意氣惓惓畎畝之念上以頌吾君得士之休渠渠夏屋之成下以致小智自私之喜依歸抃詠倍萬尋常謝除待制知建康啓峙中禁之儲於焉待詔嚴北門之管用以分符夫何免廢之餘有此遭逢之異伏念某飄零暮景漫浪陳人中猶古井之無波外付太虛之擷影面觚稜而去國正爾萍浮手鑱柄以歸田遂兹樗散欻奉起家之命驟還持槖之班十國為連弗輕付與八命作牧宜屬老成過録虛名有慙專智兹蓋伏遇某官範圍元化櫽括羣材凡登除吏之書必取知名之士猥容不肖辱在下風治大國若烹小鮮安取煩苛之政履薄氷而待白日敢忘惕厲之思謝王鎮江啓叨膺明命假守近藩顧惟踈逺之蹤久荷劇煩之寄人微地重政拙心勞坐觀嵗月之遷曽乏絲毫之報顧終更而已幸繄冒寵以何名况兹清逺之鄉猶襲外平之舊教條踈濶風俗阜安本聖朝所以優賢豈一介得以尸祿據非其所悸靡自寧伏惟某官學探遊夏之淵源文造嚴徐之義理長孺宜居禁闥暫為重於吏民望之雅意本朝行趨歸於左右曲借齒牙之論助成羽翼之私某比過邦封猥勤館候敦篤生平之至契周旋地主之多儀望數仞之墻悵莫陳於謝謁分一燈之照幸未逺於餘光傾頌之私名言莫既與水軍統制啓外鎮長江久服韜鈐之妙負丞下邑行親鴈鶩之書仰餘芘以知歸撫微蹤而自幸伏惟某官才望百夫之特家聲六郡之良取蝥弧以先登共用之謂有韎韋之君子多禮乎哉當敵馬之飲江突蒙衝而斷紲付征南荆門之事成周郎赤壁之名方展壯猶益圖顯績某空踈不學魯鈍非才半世宦途雖粗更於簿領六書吏考猶未脫於選階強從升斗之卑陬自笑生平之落魄哦松謝事敢尚友於風流杖䇿造門儻共觀於士戲春風駘蕩戎幕燕間願遵六氣之和上副九重之眷回交代趙主簿啓一介修詞嘗展告新之敬八行委貺乃賢從事之臨喜期問之及時見交情之拔俗禮踰縞紵契協金蘭伏惟某官行重以威學優而仕沅江九肋之鱉固自不羣漢家千里之駒正應逺到某少淹簿領即聼鋒追夫何揚粃之蹤猥有匿瑕之幸輕車而就熟路日俟先聲尊酒而話平生行修永好冬溫如許德履若何尚嚴宣納之冝垂副傾祈之悃回曽郎中啓望顔角以傾心缺然嵗久攬詞章之在手穆若春溫仰陳義之為髙愧勞謙之特甚伏惟某官承七相五公之裔懷千變萬化之才學有淵源笑行潦潢汙之易涸文傳正始備黃鐘大吕之相宣蚤追前輩之英逰妙絶諸公之句法風流三郡聲采一時襦袴之謡正應餘事江山之助益壯髙懷暫休歷塊之蹤即展垂天之翼顧兹假守久已倦遊仕契百年荷親情之最異邦畿再命喜事守之輒同望門著以非遙悵音塵之坐隔新涼在候燕處多間願承眷注之隆益保節宣之適與荆南到任啓佐六官之長甫踏舊班帥十國之連屬勤逺略百口江潭之阻窮年氷雪之交懷綬知歸息肩有喜伏念某老於行役晚矣會逢碧落清都猶疑夢到蒼顔白髮久合歸休以言語侍從之華膺禮樂詩書之選人之所欲誰不願然正惟荆楚之故區中扼西南之要會顧憂所屬稱塞為難百里而半九十之時敢惜既愆之力一士而賢百萬之衆恐遺執事之憂此蓋伏遇某官建非常之原開衆正之路杞梓而有數尺之朽每動嘆嗟琬琰而易一羊之皮殆輕授受尚惟終惠曲軫深仁能者任而愚者休行當引分勞以生而佚以老俾遂餘年回胡和州啓劄符江介善狀無聞將漕關中誤恩何取笑倦遊之益晚知懷祿之為慙餘論所加感悰特甚伏惟某官居今而好古人之節起家而有當世之名此膝不屈於人寧甘義辱與首俱睨於柱竟以禮還有嘉蓋世之英克壯長城之衛流民占八萬餘口之數不怠招來明府髙三十五政之賢舉能誦説佇聞褒詔即步華塗俯眷衰蹤久違髙誼未奉一行之信遽膺十部之臨今袴昔襦遐想風謠之盛貧家富壁尚分光景之餘謁謝無從占詞匪報回莫揚州啓投綬歸來久負故山之約追鋒入覲又躋法從之班曉鞾驚待漏之霜倦馬兀鈞天之夢猥慙樗散誤著鵷行此蓋某官蓍龜清廟之前陳杞梓鄧林之珍産詩書禮樂為今第一等人忠正仁明宜秩中二千石久已屈清評於月旦惠然發麗藻於春華仰惟貺施之隆莫喻感藏之至回李邵武啓分判之優號稱小選敘遷之寵登冠前行自惟非藻鏡之才難以據銓衡之地拜恩不稱賀德有歸伏惟某官以八面受敵之資佐千里提封之寄問牛知馬吏畏於神明今袴昔襦民安於惠愛笑談治辦指顧風生究觀剸決之餘盍付劇煩之會凝清香於戟衛難徇髙情别利器於盤根要看能事顧惟譾薄夙荷眷知方圖啓謝之恭遽佩箋題之辱品評所逮愧無佳吏部之稱詞業難量敬有行祕書之嘆感藏兼倍報稱奚堪賀宰相生辰啓五百年而名世有開合德之符八千嵗以為春願罄大年之祝紛賀僚於公府錫備物於中朝四海傾心一詞贊慶恭惟某官稟天地中和之氣膺聖賢亨泰之期名在圖書夙識中興之佐志安社稷獨成不世之功援斯民於水火塗炭之深登太平於禮樂文明之盛夀域亘八荒之表金城維萬世之安方國家卜世以無疆宜福祿自天而未艾慶傳衮舄封誓山河釀滄海之水不足以飲公之勳汗南山之竹不足以紀公之德階符同耀拱宸極以常尊神嶽比崇鎮坤輿而益固永隆國夀共對天休某猥以么微久叨鈞播望公孫之寶閣莫厠下僚歌史克之頌詩第傾善祝回竇教授啓拔尤士黨主善頖宫學有宗師人知矜式伏惟某官文清而行峻心醇而氣和養弟子以萬鍾暫館諸侯之學分圖書為四部行登著作之庭惠然徒御之臨賁以箋題之寵悟色絲之隱字端是好詞賦木瓜之卒章第慚匪報與教授啓竊伏海瀕久聞於髙誼思樂泮水更咏於英遊敢繄掾吏之冗曹得見古人之益友伏惟某官淵源自得議論有餘溫純雅頌之聲特達圭璋之表談經廣坐重五十席而未休成書滿家奏三千牘而盡善久屈諸侯之學行歸六館之華某蚤嵗倦遊一官祿養追隨下走顧慙儉府之多賢矜式百為願聽鄭人之餘論參承不逺頌咏何窮春日舒遲鱣堂燕暇益祈保衛式副傾瞻賀葉樞密啓伏審眷用儒英典司樞管太平有象外侮自消恭惟歡慰某官惇大而直方髙明而肅括材無不宜而譽尤高於藻鑑道之將行而名已覆於金甌折萬里之遐衝方握五兵之要振丕天之大律行躋百揆之尊輿頌所歸斯言可必某蚤瞻光範今芘台躔聞成命之顯行先衆人而竊抃謝安撫樞密啓庇身幕府曽微殿最之書會法銓曹必考嵗時之要眷此成終之賜實繄大造之仁伏念某以至愚極陋之資無殫見洽聞之智井蛙之識寧與於滄海鷽鳩之勢僅起於蓬蒿通韋氏之經那識淵源之自守恬侯之訓粗傳孝謹之餘每憐人品之凡獨愧家聲之舊一官延賞三嵗奉祠逮庇職於軍書愧何功於祿食無官府庶常之事知解去之易然若考功六事之文荷庇全之大者兹蓋伏遇某官道隆當世望重本朝精神早會於巖廊功德勤施於上下尹兹東土少膺畢命之隆正是國人行聽周公之入將舉萬方而被賜豈容一物之遐遺顧么微今日之夤緣信鈞播異時之有託徘徊軒廄已深感戀之私激烈肺肝敢負依歸之志賀宋樞密啓伏審峻膺休命入秉事樞付兵本於老成中外相慶列儒宗於嚴近朝廷益尊恭惟某官學造古人之大全言為當世之有用重厚之德足以鎮浮動恬靜之操足以律懦貪守道弗移蓋舉世莫為之勸沮得時則駕顧外物何有於重輕退非務於為名進未聞於有意非天下至誠孰能與此宜天子舉國而以聽焉方將清心省事而休息斯民斫雕還淳以敦厚習俗丙吉以寬大為務能輔政於魏侯曹參知清淨之宗實同心於蕭相更期廷告益副巖瞻某夙荷眷私喜聞除拜望相君翹材之館悵未遂於登門上聖主得賢之詩尚廣求於所部賀葉樞密啓伏審顯疇民望晉長事樞人知帝室之益尊士識上心之所嚮恭惟慶慰竊以某官經術足以謀王體而斷國論行義足以厲風俗而厚人倫伊尹處畎畝之中已負致君之略賈生言治亂之意蚤陳憤世之書請尚方劍而當寧竦聞呼大將軍而在廷屬目蔚然公輔之望久矣江湖之鄉宣力四方而莫敢或遑寤主一言而不以為泰惟士之特立獨行有如此者豈利則枉尺直尋亦可為歟果須千載一逢之時立登三事大夫之行眷言兵本折衝之地必有廟謀先物之幾從容帷幄而為國勢之重輕慷慨議論而起士氣之偷惰子玉有禮而晉君為患長孺守節而淮南寢謀成道德安強之威固方享太平之福用文武長久之術亦宜惟往事之師用宏萬世之休遂正三公之拜某辱知舊矣聞命灑然賢路光亨益喜治朝之盛餘生晼晚願均田里之安顧賀厦之無從第搖旌而莫喻賀周樞密啓伏審疇咨雅望進執鴻樞繼吳陸於內廷親承睿奬得頗牧於禁省寵軼前聞恭惟某官多讀當世未見之書獨為古人有用之學敷議動衆成書滿家玉振金聲洋洋乎終始條理之事周情孔思炳炳然仁義道德之言獨顔子能當聖耦之稱無仲尼不在弟子之行青錢之中萬選雖兩科適以慁公黃麻之似六經信斯言可以行逺禮樂大備典章一新久已處君民於堯舜之隆固將易軍旅以俎豆之事當兵本折衝之地佐廟謀先物之幾克壯之猷即授以柄蓋在內為姦在外為宄非聖人孰能去兵若善戰不怒善敵不爭惟有道乃能持勝偉哉不世之遇有此非常之勳君臣相得而益彰福祿方興而未艾某辱知舊矣聞命灑然奉詔起家早借丹青之潤量材制器又歸埏埴之公方君子之得時屬奉使之有指未遂掃門之役不勝賀厦之私又伏審顯膺睿簡寵正元樞中外竦聞兵民相慶咸謂國家以碩大無朋之福全付畀於𢎞毅任重之臣從容聲氣而為世重輕慷慨論議而制時豫奪風采所向姦宄自銷上方兼注於安危一士信賢於百萬國之衛也天實為之恭惟某官卓然公輔之姿加以聖賢之學危言正論蓋嘗攖神龍而批其鱗憤世嫉邪幾欲挫虓虎而奪之氣器博固難於近用道大何病於不容張湯敗而長孺之言乃聞主父見而天子至為太息側聞於明目張膽之地所進皆憂國愛君之謀知無不為言底可績綱紀百度勤勞四方來君叔俱安兩義不有其功鄧將軍深有大度乃授以略蓋大器莫先自治而上兵所貴好謀將措泰山四維之安必建金城不拔之䇿充國上便宜之計以逸致勞李牧為收保之謀成功在久惟公造膝與世維心遂垂竹帛之勳進列公卿之位某屬將使傳阻拜省庭舒一綆於千仞之淵夙荷生全之賜持左引於羣材之地親逢器使之公幸會居多依歸莫喻賀黃樞密啓伏審親承帝簡晉秉事樞方武王之殄世讎要同心德宜漢家之本兵柄兼注安危得賢當百萬之師逢時慶千一之會君臣遇合古今所難竹帛圖功漏刻以冀恭惟某官著書明孔氏百家之意得名在京師諸儒之時非王道不陳本孟軻之所學以天下自任若伊尹之先知義不少貶於羣枉之間志在大亨於更化之後山林臺閣正自何心富貴功名固應餘事遍厯侍臣之省尤髙夕拜之風批勑毅然有宰相之器回天力甚皆仁人之言令國家恢祖宗萬世之休攄神人三紀之憤首圖望實登用老成中外屬心兵民望賜率其子弟攻其父母彼方倒行而逆施之綏厥士女篚厥玄黃吾將不戰而屈人矣然而非有先定之䇿則亦難成必勝之功髙祖百戰而志不衰光武大敵而勇乃見小有利鈍不為重輕幾益廣於上心期竟成於有志秉白旄而仗黃鉞佇瞻戎輅之威儀清宫禁而奉寢園大慰中原之父老惟公懋績永世有辭某伏謀除書喜新衆聽述王褒之頌上以贊吾君甚盛之休名鄭公之鄉下以志小智自私之喜賀蔣樞密啓恭審進司樞管入踐政途釋筆硯而秉化權踵公家之盛事下臺門而見府吏掩詞禁之前聞禮敬絶於坐中風采聞於天下用儒之盛於古有光恭惟某官躬上賢之資懷先聖之道誠參髙厚氣備中和粹然金玉之難名肅如宗廟之祕寶登泰山而識介丘之小衆推儒術之宗望喬木而知故國之尊家有世臣之烈雖公侯子孫必復其始而文章言語與事相侔功業逐日以新富貴吾所自致器博函牛之鼎音諧儀鳳之韶學士聲名青錢之中萬選翰林制作黃麻之似六經偉天地之中間猶日月之皆仰無仲尼不在弟子之列若伊尹自任覺民之先鴻惟斗極之居象法神幾之府阪泉七十二戰黃帝不能以去兵相州六十萬師郭令猶為之不守蓋善教莫先於備豫而師律所禁於否臧要為堂上之竒無蹈泥中之鬭徐收應敵之謀必有順人之實近考傾輈之載路追懲畫餅之虛談以起非常之原不負平生之學鴟廳黃閣榮遇叵量象鼎丹書登載何極某蕞然陋器舊矣下陳控大厦以飛鳴望洪爐而踴躍效一狐之腋慙非粹白之求濡千之毫願罄汗青之述平江到任啓薦將使指方叨內地之榮就畀守符俄竊輔藩之重俯揆么微之迹仰知君相之仁伏念某名迹湮微技能短淺適際休明之運屢叨煩劇之除曽無善狀之可稱豈復超榮之敢望眷兹會府密邇上都地扼五湖衣冠指為走集之地城連萬井人物夥於升平之時自揣何堪實難仰稱兹蓋伏遇某官以伊周之業為己任以堯舜之道事吾君雖當極盛之期不廢兼收之路猥涓便郡俾效寸長某敢不虔奉詔條力求民瘼儻萬一有絲毫之善亦庶幾酬造化之恩過此以還未知所措回知縣到任啓伏審暫屈長才俯臨百里官得祥明之長民歸慈惠之師遲公之來惟日為嵗伏惟某官有先幾之智而行其所無事有絶人之藝而守之若不能名在諸公之間身兼數器之用法當治劇將以考功政有能稱即應召見眷言治邑介處通都春秋玉帛之往來冠蓋舟車之走集雖一嵗之通不可勝計其費然萬室之賦豈得謂無其資譬諸不龜手之方在所用耳副以屠牛垣之技定饒為之某猥以庸虛幸聨參佐方欲通名而未敢遽蒙損教以相先與黼黻之觀已拜多文之寵入芝蘭之室第勤與善之心敷謝之誠趨參可既與知縣啓入芝蘭之室未慰夙心聞弦歌之聲猥同王事顧慙窳陋獲造光榮伏惟某官杞梓上材璆琳異稟智周事物若龜卜數計之無遺學造精微譬魚躍鳶飛之自得小試割雞之用衆稱展驥之淹行觀三異之上聞即駕一封之乘傳某學無所得仕不知方敢不盡心行託同僚之好告之以善願承君子之規春日舒遲公堂勝暇尚祈保衛益副傾瞻回姚平江謝到任啓伏審躋榮册府擢正輔藩國用循良民知休息伏惟慶慰某官度逺不形於畛域學優已謝於筌蹄家有吏師鄙昔人之泥法上知卓行特懷器以須時乃眷吳門今為馮翊雖詭轡之馬調御為難然脫淵之魚駭波奚賴會當屬意於簿書獄訟之外庶幾䇿勳於閭里愁歎之中當世所期於公為稱某自維虛冒竟意幸除推譽過情固莫當於委蛻平生稱許殆難避於賞音欣快之深占寫奚盡回孫秀州謝到任啓伏審森陳牙衛甫見吏民一頒寬大之書四溢中和之頌伏惟慶慰某官家有經綸之逺業身先英俊之諸儒抱槧懷鉛蚤騰茂實牧人御重今見長才圖荒政於左餐右粥之間息愁歎於五袴一襦之外眷言暮齒獲聽風謡三輔有聲行即舉漢家之最萬物吐氣能為復舂陵之篇猥承謙眷之相先辱貺箋題之甚寵凛有嵗寒之義散為春藻之華陳迹已空猶是粃粳之舊倦優竟晚但驚城郭之非懷抱之私參承以既賀曹紹興啓伏審報成郡政擢長帥符載宣節制之威一竦吏民之聽眷知彌厚進用叵量恭惟某官以敏鋭兼人之資有慷慨濟時之略投刀肯綮恢然遊刃之才受命嵗寒凛若後凋之操早振中都之風采久傳益部之聲詩乃眷東郊密依帝室處萬壑千巖之勝居五侯九伯之雄自非一代之名流孰副公朝之盛選舍蓋公於正寢知家世之可師登黃霸於潁川想詔除之可待某幸聨親契喜聽郵音顧坐阻於分封悵莫陪於賔履其為欣頌莫既敷宣通問王舒州啓望夫子之門墻敢窺全美備南陽之幕府乃竊餘輝豈繄幸會之來大過平生之望輒攄固陋上冒等夷恭惟某官以髙明傑異之資負廣大精微之學禔身有道敏於事而慎於言稽古之文閎其中而肆其外偉哉全德之君子卓為當代之能臣自時執法於殿中久已知名於海內謀謨而合上意議論而動衆心側聞廣厦之燕間屢貢封章之剴切發姦摘伏衆髙三院之威聲興禮舉遺一掃曲臺之聚訟漢廷無出其右天子益重其才內閣清資不妨寓直名藩要地少示均勞髙情肯薄於淮陽治最果優於馮翊賣刀買犢而人間務本問羊知馬而吏不敢欺好賢容水薤之規美俗藹袴襦之詠久不見賈諒興宣室之思果來召參宜趣舍人之計某少而失學仕不知方已甘控地之卑飛自笑面墻之何見頃終更於泉府偏玷列於右曹念惟兩鎮之職官自昔有唐之繁使與聞郡事總授軍書緑水紅蓮莫副風流之選褒衣大袖敢為舒緩之姿誓殫十駕之勤仰覬二天之芘趨承不逺喜懼交中春日舒遲黃堂勝暇願謹節宣之適用承眷注之隆通問吕池州啓厭直明廬暫屈股肱之郡負丞茲邑行供鴈鶩之書自憐夤幸之多獲託寬明之下敢忘分守輒布依歸恭惟某官實大而聲宏芒寒而色正登泰山而識介丘之小於道為高望喬木而知國家之尊所見者大坐閲四朝之舊晚膺二聖之知合堯舜之典煥然成章鄙齊魯之儒斷以能事方倚蕭何之相國適須龔遂之安民知馬問牛一新舊俗昔襦今袴立播歡謡行興宣室之思遂冠前疑之列某庸無殖學朴有教忠半世仕途雖粗更於簿領六書吏考猶未脫於選階悵艱難險阻之備嘗知潦倒粗踈之無用強顔寸廪斂板下陳對二松而哦其間敢一循於故迹述六職以輔其令尚勉繼於前修庶幾善事於上官萬一獲伸於知己拜庭伊邇矯首知歸回知録求薦啓識小異於稠人長懷永好傳髙文於四坐更荷珍投惠然使價之臨猥自聽聞之誤伏惟某官聞望太平之髦士從遊英俊之諸儒再見而位上卿難量逺業一日而薦七士會有當人俯眷疏蹤正慚窘步在昔相須於滿嵗於今猥乏於衍章祭竈請鄰顧髙情之安取通波易漕竟後悔之徒深度在仁明諒兹悃愊糾曹多暇秋氣日佳願加尊飬之方佇看摶扶之舉回封州太守啓積年去德愐然音驛之踈萬里貽書恍若平生之舊凛凛嵗寒之義英英春藻之華伏惟某官問非一師身兼數器過都越國蚤騰天驥之稱錯節盤根屢試硎刀之妙小駐雲霄之步一蘇嶺海之民即聽鋒追入躋槖從眷言契闊日費傾馳晚嵗倦遊未遂歸田之請故人得路佇分共績之光千萬欲言咫尺難罄謝太守啓談遊無取方升君子之堂讎校非長遽館諸侯之學居有事賢之幸退慙養士之仁竊以一卷之書尚由師友之教千乘之國盍恢儒藝之方矧扶風馮翊之邦慎黨庠序術之化垂籖插架擬石渠天祿之藏斷簡殘編備魯壁汲書之富惟古今之並列實真贋之相仍凡章句義疏之文與偏傍點畫之字必假朱黃之正庶幾魚魯之分宜得該通使之刪訂豈容不肖亦遊其間某也讀書不多識字有數幸年嵗之未暮憑文章以自宣斗酒百篇無復長安之豪氣一唱三歎空餘清廟之遺音纍十上而敝貂裘分無真賞一再見而賜拱璧乃辱謬恩知我者希得此蓋寡此蓋伏遇某官以藩鎮之重屈韋布之流凡一時賔客之間皆天下豪傑之士裂裳裹足無復四方之遊抱槧懷鉛益精六藝之術過此以往未知所裁贄見太守啓箠楚塵埃之吏身辱在於泥塗藩維屏翰之賢勢逈髙於霄漢敢越部中之賤冀收堂下之言伏念某猥出諸王孫之家曽無佳公子之譽生涯何有飢寒嘗走於路隅學殖無聞佻達見嘲於城闕井蛙之見不踰於缺甃溝鴟之困未脫於汙泥固嘗掉鞅於藝場竟復暴鰓於級浪三山凝望風輒引船千佛登名手徒加額黽勉一官之延世經營三釡之及親几案徒勞簿書藂委障西風之扇敢謂孤髙歸南山之廬未能獨善跛鱉終難於千里棲鸞又托於一枝投刀雖愧於善藏血指僅逃於學製高士不為主簿何愆流俗之譏能賦可以大夫會有賞音之歎仰止登龍之地時哉薦鶚之書奉已知歸傾心有待恭惟某官博洽得行祕書之號仁明有古循吏之風人託帡幪盜除囊槖流民占八萬餘口之數越古所聞明府高三十五政之賢於今創見行拜黼黻冕旒之賜益彰戟纛兜槖之雄矧上方力超兩漢之隆而高第間補九卿之缺潁川之徴黃霸若稽古訓之甚明河南之薦賈生未許昔人之專美丹砂赤箭儻在兼收方桷圜椽固應適用宜比祥金之躍願言良冶之歸去不待麾已恕事官之慢用而反令又矜將母之私惟大賢曲示於優容故賤子敢干於洪度誠得如洛陽史望見而備孝亷之數或能為楚公子奮發而收下客之功贄見運使啓箠楚卑官分甘下走鄉閭晚出且乏更題惟竊嚮下風之行謂當在弟子之列蓋聞賢者引類之事特以公道得人為心舉子舉讎固非有激匪親匪舊豈得盡知三書而干宰相者欲及可進之時一日而薦七士者適彰兼聽之美門無私謝政以何嫌啓輒數陳孰為篤信誠使異時相望於衆正之路庶幾此事無愧於太平之朝兹舉世所為深嗟豈不肖得以妄議伏念某讀書不多而蚤有科目之纍應舉甚拙而偶成祿養之謀潦倒粗踈動不切事凄涼奔走甘為折腰顧方自於山來了未更於世故近無以買遊士寓公之目上不能借當世有位之言鞭䇿疲駑彌縫短橛如拆襪線如折轅車敢論千里之功何意寸長之用分無舒翰見而異之今遇盧公死不恨矣伏惟某官藴奧聖賢之學高明經濟之資博施以仁而不蹈問無齒決之偏理財以義而立有混若泉流之富言無忤色令若負霜上知堪任於公卿詔謂循行於京輔就車遣訟衆驚朱博之神明屣履見賢身屈勝之之威重鋪觀巨業叵識逺圖宜斯文以為統盟誠多士之所寄命附驥甚寵那止一時墮甑成名固將百世况兹負弩之賤嘗親跪履之恭出婦嫁不越鄉要卜平生之遇化金成於點礫正須變化之神將使韓愈獲禮於主人之門敢忘豫子當報以國士之義過此以往未知所裁賀錢運使啓伏審論撰奎圖將輸郊甸天威咫尺暫來面棘之朝禮樂光華親被臨軒之遣先聲肅物屬部歸心恭惟某官卓然公輔之姿加以聖賢之學英辭麗藻足以潤金石而諧韶濩崇言閎議足以判矇聾而契蓍龜家近三台時論美衣冠之表貴傳七葉世臣推忠孝之宗周旋資望之最隆簡注上心之已久飛英騰實不愧古人持節分符幾半天下惟出處君子之大致而命義臣子之當然究觀用舍於十年之間孰窺喜愠於兩忘之外一封而駕乘傳果膺賜覲之榮再見而位上卿遂當萬乘之意少展佐王之略益籌裕國之功矧兹漕挽之成謀固自笑談之餘事佇聞課最即侍禁華某猥以縣章屬居使部鄉老之興三物屬號召之鼎來刺史之布六條顧奉承之獨後仰矚外臺之峻即修下吏之恭燕賀良勤鳬趨有待賀汪樞使啓恭審使表樞庭恩均宰路視諸故府實國朝圖舊之章髙出在廷有天聖押班之制肇兹曠舉簡自上衷得位與時旦暮千載允文且武今古一人竹帛垂名漏刻冀見伏惟某官量閎而履正資裕而器周用之則行舍之則藏優入聖賢之域窮所不為達所不與夙成公輔之資以帝堯咨命之臣膺畢公保釐之任儀刑著定寤寐老成簡書登載於來歸天子興嗟於見晚從容端委感會精神仰承環極之尊益示泰階之應及國家間暇之日成道德安強之威若神龍襲淵泉之珍而猛虎為藜藿之衛內寧必有外患雖聖人莫能去兵近恱然後逺來惟仁者可以無敵維公造膝率土繫心盡行伊昔之言大起非常之烈某喜傾意氣與有光榮飛鳴厦屋之成踴躍大鈞之播禮之過而賜之大慙國士之誤知施愈博而心愈卑識君身之且相重惟窘步絶意通津如涸轍鱗如病顙馬正假揚波於碣石或能顧影於瑶池抱槧懷鉛敢云越俎奉令承教猶可著鞭叔孫之謂聖人兹維時矣侯生之有矜色未許先之且慶且祈以抃以躍回霍少卿啓十年去德有慚音驛之踈一介踵門忽拜函書之辱凛若嵗寒之意散為春藻之華坐念聲容恍如疇昔恭惟某官清標冠世令望在人言若波瀾蓋窮之而益逺道如金石雖暗然而日章顧惟靜退之有年想見涵養之益厚佇聞亨復徑步髙華某久已倦遊不堪治劇空慙謡俗蔑聞襦袴之音尚喜官曹曽識芝蘭之秀何時一見盡布所懷寒事方興端居有暇願保節調之適式符頌祝之深回都統啓賦祠官之祿方竊便私假支郡之符豈堪共理念昔淮墳之奧壤為今邊圉之要區方猾夏之未平正防秋之當務宜有文武兼資之士以圖樽俎折衝之功自省妄庸恐辜憂寄兹蓋某官智勇萬人之敵功名一世之雄號令凛凛有前賢之風方略恢恢謝古人之學五侯九伯實專賜斧之征寸地尺天盍副披圖之望重惟乘障預在提封方須告命之頒即上記曹之問義先謙柄過形慶勞之勤道出和門佇快軍容之覩其為感頌悉俟占陳回太常少卿啓筆槖清班何缺馬牛之走藩籬倦翮寧堪鵷鷺之行誓將歸卧於故丘敢復貪榮於末路石田茅屋久矣就荒玉佩犀簮斯焉假寵此蓋某官學紹商周於百世名高齊魯之兩生定章句為十二萬言當益彰稽古之遇均清濁以八十四調豈惟觀雅樂之成曽是名流猥加惠顧享敝帚以千金之具撫朱絃於三歎之餘欲厚報於珍投第難忘於永好賀朱少卿啓伏審就升卿寺仍總軍儲人知久任以即工士以當賢而勸賞矧太府周官之舊而明經漢相之家再命而益恭兹甚盛德之事一物而三善抑為有國之光恭惟某官璠璵清廟之前陳杞梓鄧林之珍産心醉六經目營四海憂深康濟下遂萬物之宜外撫諸侯世有經綸之具封命之書昔藏魯廟隂德之報今在邴侯美哉衣冠文物之所存信矣詩書禮樂之在是賢德淹時之久逢辰更化之初眷言細桞之宿師往即飛芻之重寄占列星之次逺而有光通面棘之班豫以馭幸方將引敖倉之粟以益佐關中之饋積淇園之笴以大張河內之師坐成不世之功用對非常之遇某况迷簿領眄絶使華聳壑昻霄快睹貴名之鼎鼎震風凌雨偷安夏屋之渠渠阻陳吏屬之恭第劇頌言之至回監司啓奉奎壁之儲雅重承明之選接井參之分昔稱用武之邦退然衰朽之蹤冒此便蕃之寵會逢何幸庇賴有歸伏惟某官朝廷夙夜之賢禮樂光華之使褰帷問俗眼光空豺虎之羣持槖須賢羽翼正鵷鴻之侣趣馳軺驛奪我輔臺某甫見吏民方圖啓問占朵雲之字過為暮齒之光霽繡衣之威知遂寬條之庇賀李太尉啓伏審進位本兵入司環衛轅門交慶巖陛增隆恭惟某官心羅武庫之精兵神悟穀城之祕略濟時憂國蚤有壯圖斬將搴旗正應餘事固嘗鳴劍抵掌而馳伊吾之北何止平齊下趙而會滎陽之郊談笑折衝精神滿腹走阿瞞於赤壁已著殊勳迎大駕於渭橋行觀盛舉惟掌武貴班於二府而周廬密護於九重以彰不世之勳以侈非常之眷鼎彛交煥帶礪無窮某竊讀制麻喜深情素行冀班荆之遇少伸薦笏之恭回鍾離運幹謝及第啓伏承射䇿楓宸升華桂籍仕優而學益知稽古之勤業患不精果遂決科之志貴名愈白命服增華伏惟某官經術詳明天資藴藉允矣搢紳之雅望粹然庠序之醇儒學古入官聊展四方之志力行待舉未忘一戰之謀成書益富於縑緗下語更精於虀臼賈勇萬人之敵登名千佛之經有志竟成已蜚英於帝闕得時則駕行闊步於天衢方圖慶問之儀遽荷緘詞之辱永言慰喜莫罄敷宣回吳提宫求辟啓望衣冠之甚偉甫辱雋遊憑文章以自宣更勤逺貺靦顔莫稱過聽謂何伏惟某官超騰窪水之姿秀發鄧林之産固自風塵表物知逺到之難量可是管庫中人悵髙情之莫論適吏文之有閡無虛辱以增慚尚覬仁明俯矜悃愊與提幹啓泛芙蕖於坐中久傾賔幕書雁鶩之紙尾行踏吏塵仰寬芘以知歸撫微蹤而自幸伏惟某官身兼數器問非一師乘雲氣而負青天與道為偶駕輕車而就熟路遇事何勞便應闊步於亨衢聊復分光於使傳交章車府召對路朝賜雙璧於立談佇觀能事取九遷於一日遂掩前聞某技拙黔驢名同鄭璞宦遊半世粗服官針吏考六書未離選調早笑生平之落魄晚甘升斗之卑陬對二松而哦其間無復風流之士述六職以輔其令尚惟簡靜之師苟逃呵譴之文當識依歸之自趨承不逺頌詠尤勤回吕侍郎啓明詔視師率循故實行營命使昔用輔臣猥如積毁之生難強既愆之力拜恩不稱佩德有歸伏惟某官學貫群言聲馳九牧汲黯宜居禁闥雖重淮揚之郊蕭生雅意本朝行典尚書之事眷言絶俗之論肯收衆棄之蹤更蒙贊喜之相先益愧移書之不敏獲劉公守相之問固賢從事之臨誦羲之督將之書更識憂時之藴賀吏部侍郎啓伏審顯膺帝制進二天官銓綜得賢搢紳相慶恭惟某官以剛大之養輔高明之資詞氣雄深下視建安之餘子議論淳備追還正始之遺音早推省戶之名流雅是禁闈之清選方國家尊士夫以勵名器肅流品以正官曹非詳練多聞不足以嬰事劇而振滯淹非端毅有力不足以破吏姦而明鑒裁付妍媸於水鏡夫復何私寄輕重於權衡其誰不服益考甄量之政用觀經濟之材佇究逺猷即須顯拜某辱知最久聞命增欣莫陳賀厦之私第切登門之願
