body:
  text: 定庵類稿卷四宋衞博撰書上陳平江論治道書嘗謂治民之道易知易行而天下之士自一縣一郡至於公卿大人往往病之則亦不思之甚矣天下之事豈有能外乎人情者哉人情者何欲惡是已嘗試以吾欲惡之情而求之不順乎吾情則惡之所欲者得所惡者去而吾之情㤗然無餘藴矣然則天下之情豈有異於吾情哉聖人知其然也其治民之道一本人情而為之節文爾故凡禮之可行法之所不禁皆人之所欲者也禮之所不行法之所必禁皆人之所惡者也聖人豈固為是求合於人之情哉天下之事不能自外乎人情而人情則禮法之所由起也是以聖人之治簡而易知優游伴奐視天下若無可為初不若後世之擾擾多事者一本於人情而已非本於人情本於吾之情而已故曰老吾老以及人之老幼吾幼以及人之幼治天下可運諸掌言舉斯心加諸彼而已矣昔者孟子論三代之得天下其道盖不加毫末於此今夫天下者一郡之積一郡者一縣之積所治者狭則其所操者約則其行之也宜愈易然而古人用之於天下而有餘者今人用之一郡一縣而不足此其故何哉記曰古之欲明明徳於天下者先正其心欲正其心者先誠其意語曰有一言可以終身行之者其恕乎已所不欲勿施於人古之人其欲惡之情所以不異乎天下之情者由是而已夫惟一有汨吾之欲惡則吾之情與天下之情略不相似矣甚哉欲惡之易汨也甚哉所以汨吾欲惡者之易入也聲利以誘之富貴以淫之權勢以移之便佞以惑之嗜好以蠱之而吾之情方且淆然無適於其中所欲者未必非天下之所惡所惡者未必非天下之所欲以是而加諸人將有不勝其弊者而況於求治哉求之而不得則曰今之時異於古之時時異則事異軍需國費之不供民頑吏黠之難化厨傳使客之督過而吾之治有不可為設或為之則又曰非小咈乎人情不可也嗟夫是豈真不可為哉夫民頑吏黠之難化厨傳使客之督過此固不足為若夫國費也軍需也今郡邑之所尤病而愚謂是二者條目素具皆有不待咈人之情而易知易行者世聞是說則以為處士之大言少年之鋭氣然昔嘗以是告於有位者矣試之一縣而一縣之事治試之一郡而一郡之事裕然常有餘信乎治道一本於人情顧吾正心行恕之術何如耳昔者西漢之盛號稱循吏者不過龔黄軰數人而史之所記流風善政初無動人耳目可書之事語其商功射利則無薛宣朱博之才語其抑强扶弱則無尹翁歸張敞之斷語其發奸摘伏則不及何並趙廣漢之明今之所謂迂濶重遲之人耳然其庶幾德讓君子之風亦必有道矣詩云豈弟君子民之父母嗟夫安得是人而與之論政哉仰惟執事宏毅之操任重道逺中和之徳修道以教凛凛乎風烈之所自其淵源涵養所見者大是冝與天子共成政平訟理之功而非俗吏所能髣髴者也頃者勞於侍從之事出典三輔之政據浩穰繁劇之衝而􅊩以重厚鎮浮之徳臨輕剽浮靡之俗而服以安靜不擾之治正心誠意於一堂之上而斯民之情各得乎四境之内上下晏然福及千里其必有得夫古人之用心此某之所為思見而木獲者今乃親身見之是冝奔走以就下風久矣然某也辱寓封部之中倦游無賴不敢遽以客禮自通今将去之上都念終不可以不見也故輒誦所聞以形容盛徳之萬一非茍容悦也惟執事進之與人論民兵書某聞今議者知外侮之可憂而不知内患之可畏内患者何姦民是也徃者靖康之變乗時崛起立名字據郡邑者横潰四出屠戮焚剽斯民魚肉百倍於金人蹂踐之禍征誅招撫兵分力屈外詛内訌盖十年而後定此其徒豈人有智勇之資戰鬪之能哉舉皆閭巷之小民桀黠游惰不事生産平日棄捐父母妻子相與逰嬉羣博聚飲尚氣使酒小則聚而屠沽大則亡命盗販抵冒法禁不自齒於平民天下有釁鋤耰棘荆相率而猋起遂至於不可撲滅嚮之閭巷之姦而今為大盜之資此安可以忽不加省比年以来富家大室擅兼并之利誅倍稱之息械繋設於私室椎剥盡於膚髓貧民下户讎之到骨譸張怨詈所不堪聴頃在田間實所親見當知幸亂之衆何止曩昔起於貧窮而狃於輕剽者雖然若此之民所在而有未必皆能特起至於徽嚴衢婺建劒䖍吉數州其地阻險其民好鬭能死而不能屈動以千百為羣盜販茶鹽肆行山谷挾刃持梃視棄軀命與殺人如戯劇之易飲食之常異時有司之所不敢呵問其貪暴殘鷙之心特未有以發之耳使其時有可乘事有所激奮臂一呼正在此輩尤不可以不察當是之時朝廷能忘内顧専志外侮乎然則於今之計莫若檢舉往年忠義廵社鄉兵弓手之制别行討論厚立賞格多為爵級多給告命州委之守縣委之令勸誘豪民糾合鄉里應募之士姦民惰卒亡命廢錮之人盡得出於其間其願保鄉里者為一將其願衛邊者則為一將明諭之以不刺面不湼手事已則復歸田里為之糾合者及幾人授某官滿嵗無過増某秩有克獲者受某賞其在募之士爵幾級賞幾等皆當倍於弓兵賞格之舊訓之以坐作齊之以等級糾之以主率居可以備他盜保桑梓行可以補卒乗助邊防無向来椎剽嘯聚之虞而良民有得安田里之幸一物而三善從之昔者六國之士雞鳴狗盜不廢於齊公子之門齊之客安取此哉凡以收拾天下之軼才耳軼才天下未嘗無之有之而不見用於世其發正未可知耳劇孟侠徒也漢將軍得之如一敵國安知豪傑之士不出吾籠取之中伏惟執事念靖康不逺之鑒録古人養才之意思有以洩姦民之心消大盜之資而收狙詐之用弭内患於未形專成功於北顧實立國之基而固本之道也若夫議法制之詳則乞下之有司惟執事裁幸求薦書某聞之古之薦士者固多若得薦一士而再三加意焉者閲千百人乃一遇耳人必知之而後薦之一經薦者是為知已至有登龍薦鶚之稱而況於再三薦而不已者乎非其知之深不能也豈惟知之深非至於心相知不能也是故一日而薦七士者不自以為多終身未嘗薦士者不自以為少在乎知與不知之間耳三代逺矣漢唐以来史之所載惟蕭何狄仁傑之事卓然相望于千載間猗哉其不可掩也方韓信自楚逃来蕭何薦之沛公沛公不能用信亡去何親追得信又以薦之沛公許以為將矣必欲以為大將以為大將矣必欲登壇備禮以命之天后嘗問宰相之才於狄仁傑仁傑以張柬之進天后納而未用也他日復有問焉仁傑進柬之如初天后卒相柬之如仁傑言是二子者豈投合於一言遇之於一日者之比哉非心知其可用用之而必可與辦大事成大功上則君䝉得賢之福下則不累吾賞㧞之公其敢凟告之若是哉其敢必之以將相之任如吾所欲哉自今推之所以成漢業復唐祚微韓信張柬之幾不能底於大定其不負所知亦大矣其視後之人循故事應尺度嘗試以進者亦有間矣抑聞之古之君子其事君行已立政立事凡所以自處者要不可以茍合將有為也將有言也必其見之明知之審患不言耳患不行耳言之必可行行之必可成進則有以信於君有以信於民退則有以信於吾之心是故事君而每輙變其説者欺其君者也欺其君者欺其心者也是商鞅之事孝公也是士君子之所不為者也往者趙中令進二臣於藝祖矣藝祖未之録也異日復進焉亦未之録也他日又進焉藝祖怒毁其書投之地中令俯拾納諸懷以歸他日復表飾以進於是藝祖大悟藝祖之悟非特悟于此二臣者也中令之舉非特區區于此二臣者也凡其君臣之間將有為將有言者於是脗然盡得於精神之際德日起而大有功傳無窮而施㒺極未有不由於此也嗟夫大哉君子之用心也大哉古人之用心也後之君子有志於世者可不務乎伏惟執事先生以文章道徳為時名卿其事君立朝修身制行可以不愧乎古之人矣某也一介賤士鹿鹿於簿書塵土之役自度無寸長可以表見於下風執事者過聼固嘗以其愚不肖之迹上累知人之明縣官以為可賜之階陞之恩矣然某猶自謂朝夕備趨走受教令於㦸衛之間在諸從事中獲温顔被恩意若尤異非他人比者因伏思念前之所以進之者則固知之矣今之所以恩意之異者則尤知之矣知之深遇之異則某之所以自期者固不應淺鮮矣是以敢進乎前説而欲以改秩之文重累於門下也然是舉也自他人言之則為凟自知己言則未為過雖某之愚决無足以望古人之藩籬庶幾其萬分然區區所期乎先生以古人之用心者如此先生光明盛大之業上知之矣民信之矣歸而佐天子秉大政進退人材其所成就視前數公何逺之有夫季布之得名曹丘揚之也燕王之得名郭隗先之也伏惟執事先生録其歸仁之心而遂其自厲之志施恩於曹郭一夫之賤而收名於漢唐寥寥千載之間以上繼中令之勲績使天下之人知執事之樂於成人也如此能為薦士也如此能儷美古人也如此某之能自力也如此能取特逹之知也如此能成人主千載希闊之盛舉也如此聞之四方艷之一時傳之子孫以資説士顧不偉哉惟先生少垂意焉幸甚序穽錦編序選舉之法壞而上之人始以文章取士士非以此無所求官故文章日益工而道日益散陵夷至於後世好惡蠭起科目紛更士既累於得失而眩於所守益輕棄其學以逢時好場屋之文與平昔之學遂為兩塗略不相似矣余自㓜雖習進士舉然性不喜讀時文今年下第東歸過其同舍生生曰子亦知夫子之所以不售者乎不習時文齒豁目昏此太學之諺言不爾雖至老不可得也余盖聞退之言嘗自讀其所試不啻俳優者之詞顔忸怩而心不寧者數月盖自退之已不免矣吁可歎哉今余以家貧親老求舉進士亦必至於得而已茍必志於得而求之以不可必之道是豈人之情也哉於是盡取世之所謂時文書其善者而伏讀之凡時文之學類以善漁獵戕賊竄竊摹擬取青嫓白肥肉厚皮為上真栁子厚所謂以文錦覆䧟穽者然而世之觀者眩焉余不幸知之而自投於䧟穽之内乃名其編曰穽錦非以名斯文也將以識其所學而亦其心之一日不忘乎堙穽徹錦載鞭䇿鳴和鸞以安行乎康衢大道庶幾得遂此志云爾以其甲為賦乙為論丙為䇿而序見於此焉紹興乙丑十二月望日書送王伯時赴丞連江序丞於邑其位為最尊其職宜與令分政而治然後世縣道浸輕為令者往往好専權以私已而不復分政於丞丞亦惡其専以軋已而不以誠應於令上忌下怠而各不得安其職丞之位或幾乎虚設夫惟如是故置丞以來閱數十百年而未聞一人善於其職著稱循良者良有謂也自近年以來此弊尤甚士皆庸懦軟熟委權避勢為茍禄養妻孥計者然後屑就不然則亦恥任其職不然則他邑之令疲癃不任事者易置而為之耳吁可怪哉吾表兄福唐王伯時得丞連江人謂兄貴公子屑從州縣之游而予獨以為不然伯時平居刻志慎行歉然自處於不足不啻里巷之窮儒其所稱皆六藝之文異端之學則不注於其心其商時論事極世俗之情態與夫姦弊之囊槖若龜卜數計之不僣寛然攸然若萬頃之陂有不見其涯涘者矣是真可以牧人惠衆必有以輔長而安其職者矣異時著稱循良為標的於後世者當有望於伯時矣余㓜時侍家公官秦溪始及見兄越七年以家命従事福唐與兄從游數月飲酒賦詩徃往極驩髙歌慷慨今其行矣余方窮旅周視其居無貨財可以饋贐無肴核可以祖别惟嚮之所言者書以為送送薛右司赴行在序前年冬令諫大夫王公將出疆求文武士於幕下監丞陶公猥以某進某謝不敏而陶又出其不腆之文王公憐焉以為可教於是羅致之意甚果某亦慨然有當世志曰此大丈夫請纓之秋也蓋束書問塗矣而負薪之疾錮而留之遂不果行王公一世之傑其邁往超詣之姿魁閎逺大之器照映區宇士欲收名定價於其門者如登蓬瀛渉崑閬邈乎其無由某之不肖迺在下風而奉槃㰱揚威靈曽又不得脫穎於十九人之後以奔走漢使者之光華者命也屬者幸甚獲拜節下瞻道德之容聞正大之言而窺誠明之學洸洸乎浩浩乎廼有王公之風焉猗歟盛哉公與王公皆今代第一等人某固未識王公而以睹公為快公盖受知王公而佐其幕天子又以王公之言而歸公於朝誠有以信二公之道同而喜鄙言之尤信也今諫垣憲府尚多虚位公去將峩豸冠酌獸尊厲鷹鸇之威肅鴛鷺之序明目張膽論天下大事是非可否於人主前以與王公相為先後固不偉歟王公今首諫列矣公又掉鞅而馳之由是而厯樞要秉鈞軸左提右挈若臯陶之於舜周召之於成王蕭曹丙魏之於漢以輔成非常之功盖千載旦暮爾某聞之歐陽子曰仕宦不為宰相則為諫官諫官得行其言宰相得行其道自古瓌竒雄俊之士雖抱負閎闊志慮英發思以功名自見於世而落落難合不如人意十常八九二公翼堯戴舜逢不世出之主而又立不諱之朝當可為之時諫官宰相平歩翺厯功名之資衮衮入手則其穆天縡奠坤軸合三光五嶽之氣以康濟天下其可不奮迅揚厲以大慰海内喁喁具瞻之衆哉公之行也某雖不得効前驅托後載然於二公之門不可謂無一日之知故敢道平生以為公别而又屬其願見未獲之意於公以為王公謝大江千里揚舲東下竝瓜歩出京口回望湓江牛渚之間豈無従容䕶封之對慷慨中流之誓如昔人耶公其弭節而問焉併以為歸覲之獻記最勝齋記則之作茅齋東牆之下廣袤尋丈而旁直堂寝華榱廣廡暎之蕞然低小隨意環以竹樹窗明几浄清逸虚窕有禪房道院意象主人愛且樂之充以筆研書冊茶爐奕具朝夕游息其下問余所宜名者余請以最勝名之則之家潭潭之府襟帶百畝之園平湖曲港名花怪石亭榭之勝於今實最茂苑顧嘗過之悠然如傳舍如他人之室而反屬意於是余又從而予以是名無乃厭常而嗜異者某葢及事先留尹秘閣公與聞議論之餘謂士大夫居家則當思在官之日在官則當思居家之日人情欲惡大抵一般某因贊公之說曰斯言進於道矣豈特此哉人生日用間當推吾心以及人之心宅髙明之居頗亦思世有不庇風雨之家服飾華靡之具頗亦思世有不飽藜菽之民大官大邑傳之子孫頗亦思祖父之所從得家國休戚之所宜同者若是一念常到胷中周公孔子皆従此出先公心喻而首肯久之則之佳公子也自余見其諸父當路内外聲燄炙手可熱時與今沉浮里巷其持已遇物了無異處嘗試俯仰是中嗒然隠几之外出處一心豐儉一致將深有得於此矣然則最勝之義在此不在彼則之意也先公意也頌雙椿頌并序龍口之渰東出為歸龍之瀆又東為涉墅之河河至是獨委蛇瀦蓄氣象明秀其陽有雙榦竦㧞出乎衆木之上蓊欝轇轕樛枝而連理者是為雙椿椿之下先是里人邵氏居之客有過相者曰此非子之居也後十年當有徳人鉅公至矣丙子春留尹祕閣王公税駕義興之郊特營别墅而邵氏老人夣若有緇褐申告以前言者寤而驚異公因得家焉至是適十年矣公元豐名宰相家所臨數路皆以循良稱其出處進退中立不倚者天下信之此其功名夀福先見之祥天盖有以相之矣迺為之頌堂堂王公盛徳之表維彼吉人有相之道公來相宅爰究爰處神實告之在河之滸有碩其椿並秀連理君子宜之式燕以喜維椿之久為君子夀孰侈其祥邦家之光帝曰遄歸珮玉鏘鏘公在朝廷喬木之尊瞻彼甘棠有式其門龍口之東涉墅之陽我作頌詩公其永昌銘邵元實寳硯銘陽羡邵氏世以文鳴硯其先所寳用也元實公以屬歴城衛某為之銘曰弁之峩如玉之温如而道與之腴世為邵氏文章之符將函三光混五嶽飾萬物而澤九區矣吾子邵子豈山澤之臞耶冰花盂洗銘隆興初元冬十一月癸丑洗有冰華秀異如生鐫寫者僅能形似若十二月甲申盂有冰亦如之廼銘之以侈厥祥陵隂機兮洩天巧搴桂影兮茁瑶草若諄告以厥祥鳴玉兮其子孫永夀用寳平江府刻漏銘并序平江今股肱郡官府庶事既復升之舊唯刻漏草創其制非是無以示民早晚郡守王昫實命改作某月朔漏成銘曰挈壺水兮任衡石公無私兮見天則察四氣兮正六律時無易兮政不忒通晝夜兮永無極跋代人跋御書臣待罪銓筦之三月上不以某膂力愆詔以敷文閣直學士充荆湖北路安撫使越聞命若干日入對於祥曦殿又若干日天子臨正衙遣焉凡所以寵綏付畀之渥丁寧備矣行次國門外復出御書以賜雲漢之章箕疇之秘轇轕象緯焜燿日月顧臣何足以測識萬分臣竊惟皇帝陛下以天錫之智不代出之略一九州掩禹迹合三光五嶽之氣患不為耳而能遵養時晦講敦睦一視薄海仁之至也申飭守備不忘逺略惜分隂於暇時智之大也仁之至智之大規模益逺矣聖人之能事備矣臣愚不克負荷冒昧隕越敢登景鑠暢榮號以稽方來庶無墜天子之顯休命䟦武氏石室畵像右武氏石室畵像漢人餙墓多類此諸家所記李剛魯恭朱浮武氏墓室皆章章可考者李剛為荆州刺史墓在鉅野黄水南石室三間四壁隠起雕刻為君臣官屬龜龍麟鳯之文魯恭為司𨽻校尉墓在金鄉前有石祠石廟四壁皆青石隠起刻書契以來忠臣孝子義女孔子及七十二弟子像二説出酈道元水經朱浮墓在濟州壁上刻平生所厯官車馬儀衛題曰府君作令時作京兆尹時及他官時見米元章畵史濟州有武氏數墓墓前有石室刻古聖賢像小字八分書題記姓名往往為贊於其上見趙徳夫金石録考之此畵無孔子七十二弟子及四靈形像無府君作令作京兆尹等語而有八分小字古聖賢題贊知為武氏墓室審矣武氏有石闕銘長史班從事梁呉郡丞開明執金吾丞榮數碑皆出任城趙徳夫所謂武氏數墓是也趙云墓前有石室不指明誰墓按從事梁碑云前設壇墠後建祠堂良匠衛改雕文刻畵羅列成行攄騁技巧委蛇有章似謂此畵然徳夫家東州宜得之詳正應傳疑耳某聞之喻子才郎中南渡四十年纔再見之朱晞真張如瑩氏漢碑鄉來無恙者故自有數中厄戎馬其傳益㣲此本則文字竒古少訛缺尤可珍愛乾道丁亥夏客有持示建康尹某人云即張如瑩尚書所蔵本也乃刻而納諸府廨紬中閣之壁以震耀來世云雜文鎮江府勸農文嵗二月有司㑹耆老于郊勸以農事所以示國敦本非以為故事也爾父兄子弟其勉之哉去年夏天作滛雨害爾禾稼有司奉明詔發倉廩問民疾苦捐賦役緩逋貸罷軍須之不便於民者冬又烽火日急江淮騷動天子益虚已從欲繼好息兵以綏靖宇内老弱流徙露居江介者有司奉承徳意更議賑䘏撫之字之勞之來之安之集之俾無以南北自别無以為戕敗爾是以獲保生生天監明徳瑞以三白貽我麰麥興我嗣嵗之祥矣爾等宜思所以順天心稱上㫖無惰農自安無失農時惟服田力穡深耕易耨則克有秋傳不云乎百畝之田匹夫耕之可以無饑矣五母雞二母彘植墻下以桑五十六十者可以衣帛食肉矣謹庠序之教申之以孝弟之義斑白者不負戴於道路矣夫民尊君親上樂事勸功未有不由於此故曰農者興徳之本也是以聖人務之重之爾其可自忽哉若夫省徭役薄賦歛無奪汝時則勸農之政爾宜責於為有司者我其敢不勉之哉爾父兄子弟尚明識之祝祭文祈雨祝文諸神廟季夏六月苖者秀秀者實芸者歌於野饁者讙於路則惟其時今吾四封原田之植則老而未畦下澤之苗則悴而不阜農有望雲之嘆吏興閔雨之憂中夜以思欲救無所惟神秩有常祀依人而行嵗之豐凶宜與同其職吏之不徳罰何可辭念此一方亟敷大貺沛為三日之雨用成百榖之祥觴豆孔嘉答揚敢後祈雨祝文寳公塔某來閲三時於師三有請矣雨暘之應惟吏所召吏實不徳舉必有祈祈而獲焉師則大貺之矣吏得無愧於中哉去年冬不雪今年春不雨精意甫交閔焉饗答有繭如盎有麥如雪繄誰之功師與天通今夏且季宻雲在郊秧苗老而未畦菽粟閼而未遂豐凶之决在於此日吁嗟之求敢爾展布雖威神自在普應無方而因縁出現光靈是宅宜篤此邦之祐沛為三日之霖一念所加百靈並應若民與吏永有依歸祈雨祝文再禱寳公塔九夏之季農務孔棘髙下俱病嵗將若何廼丙寅之雨鼓舞行路冀終大貺是以有辛未之祀且謝且祈而宻雲在郊風則醨之神龍在淵誰為起之非吾真覺何以告之轟雷車摇電幟指麾百靈呼召屏翳一雨濯枝以寛望嵗師之賜也民之福也吏之幸也謝雨祝文諸神廟風馬兮雲車神之行兮天之衢歴九闗而上訴兮軫斯民之嗟吁前豐隆而後元㝠兮馳閶闔而下帝都策神龍之淵潛兮駕阿香於山隅蕩八表之歊煩兮澤萬物而昭蘇旋乾兮轉坤神之功兮不可踰竟厥徳以幸吾民兮尚五風十雨之時須椒漿兮桂醑鼓鐘兮笙竽聲頌詩而報豐年兮神之明其可誣謝雨祝文寶公塔古語有之旱不苦禱而雨精誠之運天人何逺某非其人烏敢議此稽首大圓覺歸依方便門旋斡隂陽昭蘇動植曠蕩之澤鼓舞提封相我休成尚終大貺為莊文太子服藥肆赦祭告諸神廟祝文重離之象實貳君尊六氣之愆偶成疾疹上軫焦勞之念用敷曠蕩之恩爰飭有司敬陳明祀願介無疆之福立膺勿藥之祥載一角之螭快覩來朝之御望重輪之日益揚乆照之光告墓祝文某等頃嬰大戚適時多故爰卜幽宫于此淨宇松檟繁殖竁兆孔固尊靈是宅多厯年所子孫蒙福嗣有位敘維吉之從莫如此土廼撤僧藍築之傍塢度其川原大我封樹象獸有列牆闕有度宫師二品視此命數諏日維良工徒夙具展告莫親縻此尺組西望泫然有愧奠俎祭趙侍郎文嗚呼堂堂趙公崧嶽之神文武為憲四方是聞位於天朝楨幹之臣式是南國南國于旬全徳之懿如甫及申我昔見公公謂我姻握手一笑歡然如春効官建業斧繡獲親暨公阻蜀道遇逡廵别去幾何貴名日新保釐任重於江之濵朞年報政當覲中宸輔相逺業宜未易論云胡不淑䘮我徳人痛念疇昔手書見存敦篤情話謂將乞身杖屨從我卜宅吳門豈繄來思衾翣是陳哀哉此情尚堪有云有肴在爼有酒在尊公乎知乎侑哀以文祭劉侍郎文嗚呼嵗之杪秋公來自西鼉鼓烏檣擘浪如飛恵然見我於江之涯快辯傾河逸思卷蜺隂闢陽開乾端坤倪經世之具公老其誰别日㡬何疾則嬰之嗚呼昊天而弗憗遺八十之年三品之貴他人奚憾於公則匪非雷非霆維公之聲如圭如璧維公之徳天神地富萬象羅絡馳騁上下茫洋而博雜者公之學也河漢昭回卿雲輪囷髙厲逺舉焜燿而奫淪者公之文也揮斥八極寥廓萬里貴賤窮達生死而一致者公之氣也舒之垂日月巻之猶𦕈忽素富貴而不移嬰患難而不絀哀榮始終超冠今昔則又公之大全而震耀興行於世為不可企及者也嗚呼金石之契垂五十年出處離合中無間然几杖之敬耆老之賢公今往矣棄我而先嗚呼痛哉明而在人隠而在天公實至人有化無遷䘮車㑹逢銘旗歘前哭公道傍淚下迸泉抵掌笑談浩如雲烟髣髴平生尚舉我籩嗚呼痛哉祭王樞宻文惟公學以美身道以致位和以應物清以律世粹然金玉莫名一器正色烏臺為賢御史代言鵷禁為名學士入秉鈞樞本兵政地雍容造膝有大臣體唐虞君民日月可冀一朝引疾去如脱屣玉節麟符晝繡閭里東山之思西歸是俟彼何人者告之起起清標在目温言在耳豈伊一訣而公永已我來自東有棠蔽芾巋然之封望之隕涕莫親奠斚中心是愧惟古哲人有化非死鍾山蒼蒼江水瀰瀰公歸在焉凜有生氣尚其髣髴舉我饔餼祭張縣尉文嗚呼公之少年氣壓里閭志有事於四方羞槁項乎一隅去閩嶺以長嘯指谷陽其我居曽閲嵗之幾何而坐致乎名與利俱謂將官一日而九遷壽百嵗而不渝胡為乎天之不淑止中道而乃殂嗚呼哀哉孰有能居官如吉仲之嚴且明者耶孰有能惇親如吉仲之義且情者耶孰有能䘏孤如吉仲之樂且誠者耶嗚呼哀哉吉仲之生也勇有餘而嬰物之方怒言甚壯而輕身之不貲今其亡也衣冠慘其繪事音容閟而莫窺載遣車以在塗悲送客於兩岐有肴在爼有酒在巵能復髙歌以自侑説劍以相怡耶嗚呼哀哉尚忍言之耶吾儕姻親相與嵗時君肅于門喜見於眉今其徃矣終天之思遮道一樽歌此奠詞嗚呼哀哉尚饗
