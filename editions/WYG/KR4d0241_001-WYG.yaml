body:
  text: 定庵類稿巻一宋衛博撰五言古詩送長壽黄主簿黄郎千人英凛凛霜松姿鄴侯三萬巻載復無遺辭十年居太學辛勤厭朝虀詞場事雄俊傲睨深叢羆再拜天子前袍笏光陸離朅来皖水濵樂哉同襟期顧我蓬之心友婭慙非宜朝来擺征衫悵望當分携君家閩海陬去作楚郢歸大哉天宇間㑹合固有時丈夫志八表曲士守一涯錦衣行未暮鸞桂先髙枝清潤照氷玉唱和共塤箎行行得所詣何必事町畦寒江清無波愛景摇牕扉衮衮江上山萬象供品題還登古石城往和白雪詩儻因西飛鴻寄我長相思偶成雜意四首清風被草木嵗嵗蕃中園佳䕃欲翳空擢秀何争妍黄楊獨咫尺更説厄閠年惜哉堅正姿何獨慳於天長松栽萬年必在千仭巔卑哉蓬蒿間斥鷃無髙鶱如何一杯水活此横海鱣誰能激滄溟為子摶青天方朔出世士揮斥隘八極乃與優侏儒饑飽同一食調笑劉天子紿之聊一劇此意竟不傳無人子思側朝草百幅牋暮草千函書貴人肯首耳一言躡雲衢但見人因子不見子亦如梁間嘯者誰知是鬼揶揄送楊舒州我昔懐軍書西行盡淮泗是時敵方張長江飲渴騎憨將何一律兩地一朝棄川原厭膏血闗山接烽燧巋然舒子國屹立干戈地中有袴襦民未可文法治瘡痍待良藥天子念循吏誰厭承明直雅是詩書帥淮揚君肯薄吾丘世寡二正須烹鮮手往述羡魚意前驅觸炎熱弭節及涼吹朝衙百吏散閉閤有餘致臨州古云樂此理敢輕議近聞今單于已遣朝正使公師杜征南郡得漢龔遂里閭息愁歎扞牧殆餘事政成多暇日寄我千金字淮魚秋正美灊山日空翠匹馬不作難為公十日醉頗見有此客要使州人記不寐夜深耿不寐鼻息聞比鄰家童亦倡酬轟雷隠牀漘病夫黙欹枕愈覺展轉頻天籟寂不聞獨此聲輪囷懸知鼾睡夫定非識字人不然事紛糾豈得全其真世上學書兒頗結煩惱因多識一丁字便欲了八垠誰甘凍龜縮競作寒螿呻今日為何時酣寢圖安身往往中夜興起舞徒逡廵大哉出世士天地衾枕均首壓西山巔氣盖北海濵死生一夢覺寒暑同屈伸時於兩踵間出息疑氤氲蝴蝶亦翩翻客主誰疎親譬如善飲人號呶觀衆賔又如富家翁經營笑彌貧優㳺木鴈際卒嵗誰斧斤問我無眼禪答君妙入神我亦起洗醆軟脚長安春垂我大鵬翼脂我神馬輪未經華胥國聊追葛天民夢回復惘然喚起啼叢榛二猫詩地偏人跡希齋厨冷如刷老僧挑野菜豈識腥與血饑䑕知自遷畜猫竟徒設我来客南齋盤餐稍羅列烹炮愧寡鮮棄置謝瑣屑二猫亦慕羶媻跚事争齧小兒强解事叱逐加撞㧙尺箠未去手二猫復及闑懲羮肯吹虀廢食未因噎小兒恚猫癡提耳當割切謝兒兒勿嗔我曹更癡絶要之等為口已矣莫中熱題安流亭福州諸卒赴建康大閱還出劔津遂登舟東下較之度嶺有兩日之間其勞佚甚不相侔時僕亦抵江頭馬病人疲雅有登舟之意舟人告不容獨趨陸道明日流屍滿灘乃知其已覆溺惋歎乆之作詩記其事劔潭百尺深中有神物蟠東流竝山脚鑿鑿穿㠝岏廣擬一葦航聲戰兩耳寒異哉黄頭郎放棹隨飛湍勢若從天来千仭轉一圜百里不及眴孰與嶺道難長篙信敏手岸石如劔攅江頭憚瘏痡誰不謀所安嗟嗟彼征夫遭時棄師干不裹馬革中来𦵏魚腹間壯士等死耳此命良辛酸僕夫苐知免笑言雜悲歡寧知利害塗倚伏如毫端豈無跛男子不救為可歎晏安有鴆毒懐哉宜鑒觀七言古詩醉歌行軟沙挾徑草㣲㣲畫堂甲帳光流離堂外花驄瑪瑙覊傳呼直到黄金墀黄金墀下班如剪蒼槐不動蟠蛟螭出門膽落金吾將歸去泣走銅山兒河龍供鯉桂為醑御厨珍送絲絡垂乾坤整頓萬事了蹴踏四海乗丹梯丈夫生時重意氣胡為到處潛傷悲鄉里小兒狐白腋五陵豪客顛倒衣酒酣耳熱歌浩蕩揮斥八極隘九圍投戈却日日不住焚膏尚卜升朝曦君看博浪沙中客圯下偷生天地窄相期要看後五日路逢莫問前一著贈王君用求畫小屏先生本是談天口雲夢胷中吞八九一丘一壑未忘情得之於心應之手分裂𤣥圃翻瀟湘鬼神夜泣蛟龍藏興来八極眇揮灑陵奪萬象歸㣲茫十日一水五日石千年王宰今相識已知相識意相親異時直恐空相憶跨鯨挟矢滄海遊袖無贔屭無乃羞促迫能事吾豈敢激昻浩興君應酬崩崖厭床浪翻屋咫尺端将萬里蹙我生有意水石間枕潄湏君一屏足送齊六歸石城春衫快馬君来時寒江穏泛君今歸人生聚散定何許悵望十年三别離憶昔見君石城下雜佩瑤瑜間蘭麝三年一鳴驚倒人欲和薫風奏韶夏翰林主人子墨卿文章意氣飄朝雲君歸但掃三千牘後㑹却揖賢書登離離漠漠霜蕪沒江上隂風攪寒日不用長吟河畔草與君且盡盃中物七言律詩次韻張司法題鄭少尹庭下緋桃梅飄栁墜半春中庭下緋英細作叢刺眼定添新葉緑傷心應似故園紅𤣥都怨感成塵事石髓追㳺滿地風報答春光須作意亂飄繁萼向晴空張君請同次前韻速鄭少尹賞桃邂逅溪源一夢中空餘羅袖疊春叢生憐烟杏勻肌薄不分江梅映肉紅要識臨塘比西子便湏索酒對東風隨君拄杖敲門去莫惜觥船一棹空十二月十七日病中立春綵勝宫花鬧九門挽回和氣入乾坤未教栁樹誇青眼先與梅花作返魂不見新蔬行節物漫將一嵗荅春温病軀可是能頑巧偏發天公造化恩次韻贈汪解元邇来待詔溢金門詫賦誇詩陋古文獨忿典謨誣舊注直将堯舜望吾君公車兩吏催朝奏乙牘中宸達夜分且忍羈孤度殘臘行看漢殿賞凌雲再次前韻送行匆匆行役駐無因縞紵相看足禮文江濶孤舟誰伴我夜䦨尊酒獨思君離筵不用歌三疊元夕重来月十分更欲四方隨孟子此生安得化為雲次韻汪解元留别留别詩成語更酸誰憐索米困長安聖朝有意臺萊詠髙士無嫌桂栢寒聞道新書行入奏少陪征棹慰餘驩一封臨召君須出山色溪光不可餐次韻贈汪解元行平湖畫鷁春無際古寺名花色斬新走馬未同追勝處出門翻作送行頻詩成轉覺傷離緒别去應煩説舊因野店無人山月白明朝尊酒更愁人次韻酬大光見贈十年蹤跡並萍浮今日行藏謾倚樓明月相思淮水外東風吹夢越江頭深深庭院驚春晚淡淡鶯花稱客愁記取追隨休暇日殷勤陶謝許同遊次韻謝王使君見贈二首西江派别幾經年聖處騷人總未傳遺我驪珠三歎罷乞君霞佩一翩然自聞流水知音趣苦厭秋蟲傍耳煎歸去寒光驚蔀屋明朝紙價溢都廛功成刻楮謾三年技拙空慙不可傳晚事韓門稱弟子終期幕府頌燕然相看霜幹寒猶在未許蘭膏明自煎祭竈乞隣端有志只愁多指費囷廛次吳國器韻平生不作稻粱謀身世江湖一舸浮顧我方論天下事喜君還向古人求塗窮解識知津意嵗晚應甘短褐憂便欲盡擕書策賣東家還許問鄰不次何友直韻野棠堤栁固依然無奈輕寒濕暝烟鶯語匆匆無意緒花時寂寂廢詩篇曉来洗出天容靜空外吹殘雨脚連春色便湏同檢校已隨流水半涓涓次韻王大光見贈頭角崢嶸冠八龍相逢宛馬昔從東披懷一笑交情重轉眼三年世事空浪迹偶登君子里嵗寒今見古人風新詩欲報非瓊玖涉獵由来愧吕䝉春晴栁梢梅子暗春城深院誰家曲水横海燕未来人鬭草野鳩相喚雨初晴韶光縦好都来幾客抱如今作麽生風物不堪頻檢校曉来花落半階平次韻春日書懷是非無遇不心亨此道吾猶及老成知己相逢湏管鮑傳家各自歎韋平幽居幸有簞瓢樂髙枕從㸔宇宙清富貴儻來安足計且應尊酒話平生送江南聞祕校胷中逸氣凛横秋欬唾珠璣落九州堪歎羣兒自相貴如君百戰未封侯相逢不啻平生舊一笑還從汗漫游好去慇懃護行李要看鯨海試吳鈎過江上地名三山失脚塵凡不易收莫思冠佩裹狙猴但逢司馬心相許便擬中郎賦逺遊弱水蓬萊三萬里仙家日月八千秋聞名徑欲兹山隠不學劉郎世外求答吳子文東游吳苑定何年猶有佳名處處傳殆過百聞今果爾相逢一笑兩欣然强蔵燕石知君厚試乞鸞膠為我煎世上功名端易與共期雲翼跨芝廛和人雪詩白玉樓臺近廣寒冷侵銀海眩光翻只應天上梨花老聊作人間栁絮繁慶卜有年先一白喜隨寛令到千門使君浩興憐詩酒雋飲誰供五石尊病中書懷平生技拙笑屠龍去國尤慚易道東回望飛雲親舍下不堪伏枕左書空四方未了男兒志一飯長懷國士風憐我已深兄弟好願從之子客東䝉書懷一劍西来又蒯緱空餘逸氣凛横秋覉情正類南飛鵲生事渾隨萬里鷗嵗晚已驚霜入屨夜寒唯有月當樓四方八表男兒志留滯江千恐白頭萬里江山一褐裘十年蹤跡並萍浮囷禾誰展周郎指負米長懷季路憂書劍未酬平昔志水雲空結異鄉愁悠悠萬事書空足獨立西風自㸃頭次韻張君倚春郊且速東山之逰瀲色嵐光暖更妍隂晴恰稱養花天惱人春事濃於酒得意莎茵軟勝綿欲把風光供翰墨直須杖屨躡雲烟知君已作東山興緩歩何辭十里阡明日出城愛其平沙淺水有錢塘西湖氣象借前韻呈諸公花紅水綠鬭春妍長望江南憶樂天黄栗留鳴山寂靜野棠梨發樹蔫綿樓臺三竺將歸路氣象西湖欲晚烟風物不殊鄉國異好尋歸馬問長阡七言絶句春日書懷東風吹雨半斜斜青草池塘憶謝家池李山桃謾春色傷心不見洛城花人世逢春能幾回區區從使寸心灰故園花栁應依舊萬里歸思獨上來奏劄上殿劄子臣聞君天也天以元氣祖羣物君以神道制萬方盎焉而春燠焉而夏凛焉而秋肅焉而冬盤薄乎太虚之中胚胎融液不可測知而萌者達屈者信潛者奮生者遂人徒知確然在上若以不宰為功而不知天之所以祖羣物者以元氣之正也經之為文緯之爲武威之為刑慶之為賞奔走乎四海之内動化鼓舞不可測知而大者畏小者懐亂者定肆者束人徒知巍然在上若以不勞而治而不知君之所以制萬方者以神道之設也惟元氣正則茫然運窅然化所以為天之髙惟神道設則震動静専參侔開闔所以為君之尊仰惟陛下躬大歴服于今六年賞慶刑威文昭武烈所以恢張天紀奠安區極宥天下以不測之神者固已與天侔大無間然矣然臣猶有是説者以臣之愚竊謂陛下有四三王之資一九州之志銷鑠羣慝冠帶百蠻之略而功之所加化之所被尚未酬聖神之心此臣區區所以益願陛下體乾之健秉夬之决而執神之機以運天下則何事之不成何征之不服何政之不治哉取進止上殿劄子臣聞人各有能不能羿之射精矣而不能敵秋之奕造父之馭至矣而不能舉烏獲之任鏤冰者不可使琢玉刻朽者不可以鑽堅瞽之樂刖之門宫之守雖聖人不能廢其用夔之樂垂之工臯陶之理雖大舜不能更其任所貴乎量材授職因事賦官者正在是爾今之仕者自一命而至於公卿自箠楚簿書而至於稽古禮文之事莫不欲擅其能茍以一藝自名一能自售者非特其心歉然不滿而人固亦小之此古之所以職業設而萬事治後之所以職業設而萬事隳方且喟然有乏材之嘆則亦厚誣天下之士矣仰惟陛下焦心望治虚己任人士有尺寸之長未嘗不録舜之所以為舜陛下盖得之矣雖然張湯官御史大夫而仍兼治獄劉晏位宰相而不去鹽鐵度支此特漢唐近事堂堂聖朝豈固因循軌轍而分處昔人之下哉臣愚望聖慈詔執事大臣無責人以全技無强人以不能明習典章者則使之居臺閣善調盈虚者則使之主國計治獄者必法理之士分閫者必智勇之臣録所長䕶所短乆任而責成之將見百工熈而庶績凝䇿勲乎三五之上矣取進止代陳直閣奏劄臣竊觀昔之盛帝明王所恃以經理天下者亦有誠信而已耳故一政事之立一播告之修天下之士惟恐聴從之或後非畏夫刑威而然也非慕夫慶賞而然也徒以誠信而感於人有素彼中心知上之所為必也有利而無害有益而無損有可行之悠乆而無目前茍且之弊甚者可敓可殺而不可使非其上以為不誠不信於戯此其所以為盛帝明王而坐享無為之治者乎我國家聖祖神宗繼繼承承相授而守一道顧豈外夫此哉内而中國誠信之道素著故民心莫不悦隨外而四裔誠信之道素行故逺人莫不效順是何觀感如是之速耶臣嘗深求其故彼四方千里之逺盖自中國推而致之中國郡縣之廣盖自朝廷推而致之朝廷一政事一號令無往而非誠信之所在積乆歴逺斯民目之所見耳之所聞身之周旋乎其間安在而非誠信乎驅之而必往詔之而必從無有非上之所建置者廼其勢然也恭惟陛下自臨御以來凡見於設施舉措皆仰則太上皇神謨聖烈之見於已行已試者誠信之道固已得於心傳之妙宜乎内而中國外而四裔無不悦隨而效順今也敵人未至於誠服而郡縣之間容有奉承宣布之未至者豈政事號令之積容有戾於誠信者乎臣愚備數列郡朝廷有大政事固非䟽逺小臣所得與聞且如起發上供一事謂無所戾於誠信不可也始也使就池交納既至池州未幾改往廬州未幾移之行在不惟搬運轉徙有不勝其勞而舟車給餉有數倍之費加以州縣傳檄吏胥奉行憚於煩擾復不能即時支遣使管押官吏得効力職事往往遷延嵗月是致欺弊百出官物耗散其幸而得免虧失終始全保者纔十一二耳彼損折之數上司不免督責官吏不免監繫下逮兵典篙工之徒均償所負破家滅門無所從出有終身拘繫卒不免於死者其弊豈在彼而不在此乎臣愚欲望聖慈戒飭臣下及州郡綱運合行起發先議定交納去處無致數有改以蹈前日之弊不惟州縣易於奉承抑使管押綱吏之徒得免相繼坐累至於傷生是亦發政施仁之一端而朝廷誠信當自積之以著於中國行於四海也視其事疑若至㣲究其末為害至大惟陛下察臣愚衷而特加留意焉天下幸甚辭免職名奏劄臣顧惟一介踈賤何以仰稱天地生成之賜徒以臣自塵祿仕垂三十載憂患屏棄閒日居多頃嘗兩持使節甫及踰年再試州麾皆成中輟退思平昔蔑著外庸今者長沙巨鎮一旦驟被寵寄恐非綿薄所克勝任是敢力控愚衷冀回淵聴洊攽詔㫖訓飭丁寧臣欽體徳意不敢再有辭避誓當勉䇿駑鈍少圖報效惟是資殿隆名景徳所以優於勲舊如臣於陛下更化之始雖叨居政地徒勞數月無補毫分况以通籍禁帷自足假寵以臨民吏豈宜復膺異數欲望聖明鑒臣悃款姑寢進職之命容臣祗守官次他時不至瘝曠俾霑恩渥殆未為晚庶幾全㣲臣辭受之誼亦或助聖朝綜核之公屢瀆天威臣無任激切惶恐之至論治道劄子臣聞治道貴清静此先哲之格言也天下無事猶當以清靜理之而况多事乎多事之時而處以無事則事自定茍為不然徒為膠膠擾擾事日益繁去治愈逺厥今天下可謂多事矣吉凶之禮迭舉宫室之役並興與夫使命往來之交馳諸軍犒賞之頻併是皆不得已者適丁歉嵗生民艱食陛下發倉廪府庫以賑救之此又大不得已者今太倉之粟在帑之金所餘無幾京府積鏹漕司羡緡耗用畧盡州縣之間上下煎熬殆無生意人勞財匱莫甚於此時自今以往日幸無事猶懼不給萬一饑饉洊臻盗賊竊發或有意外之費將何以支為今日之計要當於不得已之中求其可已者已之可緩者緩之朝廷之上鎮之以静重百執事之間守之以靖共州縣先於撫摩邊鄙貴於寧輯休息生聚年嵗之間國用稍裕民力稍蘇然後興滯補弊建利除害亦未為晚此國家根本之計惟陛下留神幸甚取進止乞進帝學劄子臣聞聖人以天縱之能輔以日就之學固非羣臣所敢望清光而窺道奥然講求多聞咨訪治要則必有論議之臣儒學之士通古今治亂者侍清燕之閒而承顧問之缺以舜文王之盛而有九官四友朝夕都俞於一堂之上下至於秦之穆公魏之文侯亦有樂正裘牧仲與夫叚干木田子方之流相與周旋圖度以起治功斯道尚矣仰惟陛下睿智之髙明典學之緝熙超出百王之上然猶分命講讀之臣畨宿殿廬以待清問其於屬意承學尚論古人講道細氈之上甚盛舉矣然臣竊嘗觀漢之侍臣於長楊五柞之游未央宣室之燕未嘗不在而唐之十八學士日昃夜艾訪求政事商搉前載無常禮之間此固不宜専責職守之臣耆艾之士也臣愚欲望聖慈命有司討論倣唐開元六品以上待制於衙内建中九品以上待詔於兩省立為定格日使館閣之臣得侍左右以補遺忘庶幾泰山之一塵滄海之衆流或有補於萬分之一取進止辭免南郊加恩劄子祭澤之大古有典常義利之間責在臣等方睿主慶成於大報而湛恩燕及於多方不遺煇翟之㣲恵之至也辱在股肱之近人謂斯何况饗帝者聖人之能而相祝者臣工之職覿茲祲盛猥出㑹逢更疇爵土之封益重冰淵之懼伏望皇帝陛下出神明之斷刋沿襲之文俯徇愚衷特收成命為男充辭免除敷文閣待制劄子伏念臣奮迹孤童致身近輔恩流奕葉榮被一門猥如繭犢之愚更冒簪犀之寵以功則曽㣲尺寸以世則既越等夷罔懐欹器之危必致奪乘之咎伏望皇帝陛下察其匪矜於邉幅憐其粗審於盈虚鼓缶而歌未圖引養知苖之碩那復自欺終期成渙之還庶俾師虞之穆謝免男回避劄子臣自省何人誤䝉異眷父子並膺於繁使憲章靡限於親嫌再具牢辭莫回淵聴惟是君臣之遇尤難將帥之間念蕭何之舉宗從軍誰識老臣之感慨若卞壼之一門死敵惟知異日之糜捐謝賜御書風雲慶㑹閣劄子君臣之遇夙幸依光乘雲之章下施輪奐拜嘉不稱仰睇知榮伏念臣質陋枅櫨任叨柱石負覊髙邑陪光堯御宇之興仗節行營屬嗣聖肯堂之始起衡茅於里社從龍虎於天衢眷茲帝籍之舊恩表以璇題之美稱去聲芒寒色正昭垂日月之光華心快目明煥發闌干之星斗庇身有耀盡室無忘寵踰劉洎之登牀事異晏嬰之更宅寫之琬琰祕藏河洛之書貽厥子孫俾識帡幪之報謝賜端午節物劄子赤符彩縷老驚節物之新玉斚金盤嵗荷君恩之重俯念里居之秩方懐空食之慙珍送鼎來榮光益甚醉酒飽徳徒燕樂於明時食蘖飲冰尚恪恭於晚節謝賜酒果劄子禁籞秋清燕列披香之邃使軺天降寵分推食之珍肴核旅陳門庭賁耀想像蘂淵之勝賞昭蘇漳水之餘生恩厚莫名感深而抃大烹以養老弗稱於食功一飯不忘舉必懐於報徳代人進故事後漢書匈奴饑疫自相分争光武以問臧宫宫願得五千騎以立功帝曰吾方自思之宫乃與馬武上書曰匈奴貪利無有禮信窮則稽首安則侵盗豈宜固守文徳而隳武事乎詔報曰黄石公記曰柔能勝剛弱能勝彊舍近謀逺者勞而無功舍逺謀近者逸而有終故曰務廣地者荒務廣徳者彊今國政未立災變未息人不自保而欲逺事邊外孔子曰吾恐季孫之憂不在顓㬰且北敵尚彊而屯田警備傳聞之事常多失實誠能舉天下之半以滅大冦豈非至願茍非其時不如息人自是諸将莫敢復言臣聞天生五材兵不可去黄帝有涿鹿之戰帝舜有苖民之伐啟有有扈之誓而商周遂以兵革命征伐之不可廢於天下也尚矣然聖人貴去兵而不貴佳兵者誠以兵凶器戰危事不得已而用之以禁暴安民而非所以為功也傳曰兵猶火也不戢將自焚也是以聖人戒之昔漢祖既滅四方而為平城之師於是有白登之衂唐太宗既有天下而為髙麗之役於是興魏徴之思光武身濟中興閉玉闗以謝西域之質卑辭幣以禮匈奴之使審黄石存苞桑為萬世法天地之度日月之明卓乎其不可及也矣昔者太王居邠狄人侵之事之以皮幣事之以犬馬事之以珠玉弗得免焉於是去之岐山之下黜戎敵之習興禮義之教以崇后稷公劉之業周之王迹實肇基焉吳之敗越也越王反國身耕夫人織食不加肉衣不重采與百姓同其勞十年生聚十年教訓而後用之吳以不祀天子致伯於越東諸侯畢賀原二君之初心豈誠甘於受辱恬於退聴而樂為人之下哉誠以力有敵不敵時有可不可與其不忍一時之忿而窒方來之功孰若詘於一人之下而伸於萬人之上哉明者見於未形昧者隳於已成固不可同日而語彼臧宫馬武小夫之知一劍之勇徒為大言不知國計光武謂舉天下之半以滅大寇豈非至願茍非其時不如息人大哉言乎非天下之至明至聖其孰能與於斯唐書太宗嘗令封徳彛舉賢久無所舉上詰之對曰非不盡心但於今未有奇才耳上曰君子用人如器各取所長古之致治者豈借才於異代乎正患已不能知安可誣一世之人徳彛慙而退臣聞景星鳳凰人知千百年一見之為瑞而不知其無時不在天地間世人能見之者罕爾漢三傑秦之才也建武二十八將新室之才也百里奚非愚於虞而智於秦裴矩非佞於隋而忠於唐其人則猶是耳然盛世用之則有餘叔世視之常不足嗚呼世豈真乏才哉古今用人之患大抵所舉非所用所用非所長使其人不縁謬妄曠官則以貪邪敗類如是則曰天下信無士哉天下之士舉如是而已哉小則有乏才之憂大則有輕士之禍此治亂之所由分也夫士之真賢實能固豈易得而輕之可得而輕者類非其人然而真賢實能乃用是而逺去葉公子髙所好盡龍爾而真龍見焉故曰思天下有得士之實必在上無輕士之心欲在上無輕士之心必君臣知用人之術善夫工師之制木也小為杗大為櫨曲者為輪直者為桷接雲漢者以之梁百尺之觀蔽牛馬者以之航千仞之淵是以天地之産有方而工師之用無窮用人之説如是而已封徳彛不知出此厚誣一世未有奇才太宗所以累數十言深誅而甚絶之誠足為萬世君臣之法也資治通鑑韓昭侯有弊袴命蔵之侍者曰君亦不仁者矣不賜左右而蔵之昭侯曰吾聞明主愛一嚬一笑嚬有為嚬笑有為笑弊袴豈特嚬笑哉吾必待有功者臣聞賞所以勸功罰所以懲惡然功必待賞而後勸惡必待罰而後懲則賞罰之用亦狹矣明主制賞罰以寓勸懲之道因勸懲以示正大之心作於心形於言而勸懲之道固已行矣唐徳宗在奉天嘗遣一健歩出視賊軍辭以苦寒跪奏乞一襦袴徳宗為之尋出不獲憫黙而遣方是時人無離心士有鬪志及破賊之後貢賦鼎來府庫充溢而死義之士攜心惟新之望日阻此其故何哉徳宗之用心則有間也昭侯謂明主嚬有為嚬笑有為笑知是道矣誠舉斯心加諸四境之内斯民将遷善逺罪而不知靡然自立於賞罰勸懲之外如堯舜之盛世孰能禦焉是知三旌之賞五流之罰者一弊袴一嚬笑之積也比屋之封畫衣之化者賞善而罰惡之積也韓之臣子終不聞有以術廣其君之用心以追古治有君無臣古之遺歎信哉唐書憲宗與宰相論自古帝王或勤勞庶政或端拱無為互有得失何為而可杜黄裳對曰王者上承天地宗廟下撫百姓四方夙夜憂勤固不可自暇自逸然能選天下賢才而任之有功則賞有罪則刑選用以公賞刑以信則誰不盡力何求而不獲哉明主勞於求人逸於任人此堯舜所以無為而治也至於簿書獄訟細煩之事各有司存非人主所宜親也臣聞之荀卿曰人主好要則百事詳好詳則百事荒誠使人君雞鳴而起晏朝而罷日旰而食夜分而寐甚盛徳也顧可謂詳略之間治效相去如是乎豈非以人君則有人君之體大臣則有大臣之體百司庶府則有百司庶府之體詳要其可紊哉今守令一也煩苛之政聞於千里則其人曰此特縣令之材耳夫一郡守猶然况有天下者哉臣以知古之聖王非貴於徒勤也貴勤於知要者也何謂要人主之職在論一相非要而何何謂詳宰相統百官百官領衆職非詳而何宰相百官之不容好要猶人主之不當好詳宰相得其人則百官得其職人主之能事備矣宰相儻非其人百官不得其職將敝一人之聰明應萬物之紛沓雖堯舜不能以濟故其書曰元首叢脞哉股肱惰哉萬事隳哉然則文王之不遑暇食勞於求人者也虞舜之恭已南面逸於任人者也善乎陸䞇之論曰人主擇輔臣輔臣擇庶長庶長擇僚佐所任愈崇故所擇愈少所試漸下故所舉漸輕是故選自卑逺始升於朝者長吏舉任之寘於周行既任以事者宰相序進之才徳兼茂歴試不渝者然後人主倚任之贄之言豈特為選舉設哉大抵忠臣良士所以愛其君憂其國者其論如出一口臣觀憲宗君臣之間可謂知所問答矣元和之風幾於貞觀豈不由此而致哉資治通鑑子思言茍變於衛侯曰其材可將五百乘公曰吾知其可将然變也嘗為吏賦於民而食人二雞子故弗用也子思曰夫聖人之官人猶匠之用木也取其所長棄其所短故杞梓連抱而有數尺之朽良工不棄今君處戰國之世選爪牙之士而以二卵棄干城之将此不可使聞於隣國也公再拜曰謹受教矣臣聞棫樸之詩文王能官人也其詩曰芃芃棫樸薪之槱之棫樸小材也薪槱近用也文王不以小材廢近用故其得士濟濟峩峩或儀于王所或紀于方國而序詩者以能官人稱之材不能皆良人不能盡善中規者以為輪中矩者以為桷短不軼尋尺者用之以備侏儒充扂楔大而接雲漢者用之以梁百尺之觀航千仞之淵义負而偃伏離奇而液瞞者莫不各當其用故曰大匠無棄材聖人無遺善古之蘧蒢戚施刖者瞽者雖天民之窮不廢焉負販者屠沽者受金發冢之徒猶足以當一面抗方張乘風雲而書竹帛未聞以一眚廢兼人之材也豈特論将惟然傅説之舉於野孫叔敖之舉於海百里奚之舉於市由余之舉於戎管仲之舉於讎著之書册傳之來世孰不謂然而後世張以科目拘以世類閡以小文自杜取才之路徒起當饋之歎詩曰采葑采菲無以下體為此詩者其知道矣非聖人其誰擇焉新序魏武侯謀事而當羣臣莫能逮朝而有喜色吳起進曰今者有以楚荘王之語聞者乎武侯曰未也莊王之語奈何起曰荘王謀事而當羣臣莫能逮朝而有憂色申公巫臣進曰君朝有憂色何也荘王曰聞之自擇師者王自擇友者覇足已而羣臣莫之若者亡今不榖議於朝羣臣莫能逮是以憂也荘王之所憂而君獨喜何也武侯逡廵謝之臣聞泰山不辭髙而衆塵集焉故為五嶽宗滄海不辭大而衆流歸焉故為百谷長聖人不自聖而愚者之慮狂夫之言擇焉故為百世師况乎以一人之尊位四海之上日酬萬幾之務事物之至無窮而聰明之用有極是以人主不貴自用而貴能用衆合天下之聰明以為一己之聰明此大舜之所以為大也古者有衢室之問謗木之求聞善之拜不自滿假不吝改過不遑暇食數聖人者退然於身若不自足而事業掀天地聲名髙日月未聞其以臣下不及為髙謀事獨善為能也善乎子思之言曰君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生今武侯一有矜色而正救之言已聞小國之君有臣如此魏之所以獲重於七雄之世也漢鼂錯以賢良對筞謂五帝神聖其臣莫及三王臣主俱賢五伯不及其臣借是以諛世主書之史冊為當時羞其視痛哭流涕太息之書君臣優劣可以不議而判資治通鑑唐太宗嘗與羣臣語及教化魏徴對曰乆安之民驕佚驕佚則難教經亂之民愁苦愁苦則易化譬猶饑者易為食渴者易為飲封徳彞非之曰三代以還人漸澆訛魏徴書生未識時務太宗卒從徴言三嵗天下大稔斗米三四錢斷刑嵗纔二十九外户不閉行旅不齎糧上詔長孫無忌曰貞觀初上書者皆云人主當獨運威權不可委之臣下又云宜震耀威武征討四裔惟魏徴勸朕偃武修文中國既安四裔自服恨不使封徳彞見之耳房𤣥齡奏閲府庫甲兵逺勝隋世上曰甲兵武備誠不可闕然煬帝甲兵豈不足耶若公等盡力使百姓乂安乃朕之甲兵也臣聞天下一道古今一民世之人尊古太泥論聖賢太髙而待已則甚恕望天下則甚薄故言仁義則以為迂濶語教化則謂之不知務豈特貞觀之世為然哉昔孟軻氏憤世疾邪斷然以堯舜之道號於戰國君臣曰謂其君不能者賊其君者也而自謂不能者自賊者也正謂此耳今夫宗廟之中未施敬於民而民敬墟墓之中未施戚於民而民戚孰謂民之澆訛難與為善乎哉使太宗即政之初不聴魏徴之言而納封徳彞與上書者之説棄仁義任刑罰不信臣下外事征討而欲致貞觀之隆是猶却行而求及前臣知其必不能也然則聴納者治亂之原而人主之樞機乎太宗言中國既安四裔自服又言羣臣盡力百姓乂安此乃朕之甲兵正使堯舜禹湯復生不易斯言矣臣竊觀神宗皇帝御製通鑑序曰漢之文宣唐之太宗孔子謂吾無間然者仰惟神聖發揮之妙所以昭懿鑠而幸來世者明矣逺矣後世可不鑒諸唐書元和後數用兵宰相不休沐或繼火迺得罷李徳裕在位雖遽書警奏皆從容裁决率午漏下還第休沐輒如令若無事時太和中中人乘驛疾驅入金光門京城訛言宼至士民驚走兩省諸司官有不及束帶襪而乘馬者李石在中書曰宰相位望尊重人心所屬不可輕也事虚實未可知堅坐鎮之庶幾可定視文案沛然自若至晡乃止臣聞達於事變者非在於臨事之時而在於無事之日利害講明規模素定凡所以善其身與天下者固已自信於胸中卒然遇之則其已大而物小是以物來而能名事至而能辯覆却萬方躊躇四顧而不失其故常其於應變也何有夫如是而後可以任天下之重而為天子之大臣矣臣觀唐失兩河藩鎮擅誅立天子錫命惟恐不逮徳裕為相雄武軍將陳行泰戕史元忠以邀節鉞徳裕謂河朔請帥正坐報下太速軍得以安若少須之下必有變已而陳行泰果為張絳所殺絳復誘其軍以請於朝徳裕亦置而未報絳又為其軍所逐然後徐以張仲武為副大使代之徳裕之遇事不惑明斷有體如此則其從容多故之中豈偶然者李石器識雄逺當軸秉權一無所撓廷臣倚以為重是日京師羣無賴已持兵俟變㣲石幾至亂矣昔苻堅宼淮淝謝𤣥問計於安安夷然不顧游渉終日夜歸指授將帥各當其任竟以破賊長安城中訛言水且大至王商相漢不為之動二子固非李石徳裕之倫而静鎮之度亦其亞也臣謂朝廷出政之本宰相四方所瞻其經世之猷濟難之略自其所學而甲兵之問錢榖之對復有司存茍惟顛越於倉卒之間眩亂於簿書之故則鼎軸之地其形渥矣有天下者將何賴焉
